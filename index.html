<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>お嬢様麻雀</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  min-height:100vh;min-height:100dvh;
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic UI",sans-serif;
  background:radial-gradient(140% 100% at 50% -10%,#1c5c49 0%,#11463a 45%,#092a23 100%);
  background-attachment:fixed;
  color:#efe9d6;
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;
}
#app{max-width:520px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:26px 14px calc(26px + env(safe-area-inset-bottom))}
header{text-align:center;margin-bottom:26px}
.crest{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.crest .rule{width:44px;height:1px;background:linear-gradient(90deg,transparent,rgba(217,185,108,.75))}
.crest .rule.r{background:linear-gradient(90deg,rgba(217,185,108,.75),transparent)}
.crest .dot{width:5px;height:5px;transform:rotate(45deg);background:#d9b96c}
h1{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;font-size:30px;font-weight:600;letter-spacing:.3em;text-indent:.3em;color:#ecdfb4}
.greet{margin-top:12px;font-size:12px;line-height:1.9;color:rgba(239,233,214,.7);letter-spacing:.08em}
nav{display:flex;flex-direction:column;gap:12px}
a.mode{display:flex;align-items:center;gap:13px;text-decoration:none;color:inherit;background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:15px 14px;box-shadow:0 3px 10px rgba(0,0,0,.25);transition:transform .1s ease;animation:rise .3s ease backwards}
a.mode:active{transform:translateY(2px)}
a.mode:nth-child(1){animation-delay:.05s}
a.mode:nth-child(2){animation-delay:.12s}
a.mode:nth-child(3){animation-delay:.19s}
@keyframes rise{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.emblem{display:flex;gap:2px;flex:none}
.tile{width:27px;aspect-ratio:.72;background:linear-gradient(180deg,#fffef6 0%,#f6efdb 68%,#e6dcbe 100%);border-radius:3px;box-shadow:0 1px 0 #b3a781,0 1px 3px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center}
.tile .face{width:94%;height:94%;object-fit:contain;pointer-events:none;-webkit-user-drag:none;display:block}
.mtext{display:block;flex:1;min-width:0}
.mname{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;font-size:16.5px;font-weight:600;letter-spacing:.14em;color:#ecdfb4;display:flex;align-items:baseline;gap:8px}
.mtag{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",sans-serif;font-size:9px;letter-spacing:.15em;color:#ecd9a0;border:1px solid rgba(217,185,108,.55);border-radius:999px;padding:2px 8px;flex:none}
.mdesc{display:block;margin-top:6px;font-size:11px;line-height:1.7;color:rgba(239,233,214,.62);letter-spacing:.04em}
.go{flex:none;color:rgba(217,185,108,.8);font-size:14px}
footer{text-align:center;margin-top:26px;font-size:10px;letter-spacing:.2em;color:rgba(239,233,214,.4)}
a.mode:focus-visible{outline:2px solid #e9cb78;outline-offset:2px}
@media (prefers-reduced-motion: reduce){a.mode{animation:none}a.mode:active{transform:none}}
</style>
</head>
