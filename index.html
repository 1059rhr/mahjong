<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>麻雀お嬢様</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  min-height:100vh;min-height:100dvh;
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic UI",sans-serif;
  background:radial-gradient(140% 100% at 50% -10%,#1c5c49 0%,#11463a 45%,#092a23 100%);
  background-attachment:fixed;
  color:#efe9d6;
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;
}
#app{max-width:520px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:10px 10px calc(14px + env(safe-area-inset-bottom))}
header{display:flex;justify-content:space-between;align-items:center;padding:2px 2px 10px}
h1{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;font-size:17px;font-weight:600;letter-spacing:.18em;color:#ecdfb4}
#reset{background:none;border:1px solid rgba(236,223,180,.4);color:#ecdfb4;border-radius:999px;font-size:11px;padding:5px 12px;letter-spacing:.05em;cursor:pointer}
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:7px 2px 5px;text-align:center}
.stat .v{font-size:16px;font-weight:700;color:#fff;line-height:1.2;font-variant-numeric:tabular-nums}
.stat .k{font-size:9px;color:rgba(239,233,214,.55);letter-spacing:.18em;margin-top:2px}
.secLabel{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;letter-spacing:.18em;color:rgba(239,233,214,.55);margin:12px 2px 5px}
#wallCnt{letter-spacing:.05em}
#river{display:flex;flex-wrap:wrap;gap:3px;align-content:flex-start;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:7px;min-height:42px;max-height:104px;overflow-y:auto}
#river .empty{font-size:11px;color:rgba(239,233,214,.35);align-self:center;padding:2px 4px}
#fbWrap{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 0 2px;min-height:128px}
#hint{border:1px dashed rgba(236,223,180,.35);border-radius:12px;padding:12px 14px;font-size:12px;line-height:1.9;color:rgba(239,233,214,.8)}
#fb{display:none;border-radius:12px;padding:11px 13px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.08)}
#fb.show{display:block;animation:rise .2s ease}
#fb.ok{border-left:4px solid #79c79b}
#fb.ng{border-left:4px solid #e4836f}
@keyframes rise{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.fb-head{font-size:15px;font-weight:800;display:flex;align-items:baseline}
#fb.ok .fb-head{color:#8fdcae}
#fb.ng .fb-head{color:#f49a86}
.fb-sub{font-size:10px;font-weight:400;color:rgba(239,233,214,.5);margin-left:10px;letter-spacing:.1em}
.fb-line{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:13px;flex-wrap:wrap}
.fb-line b{font-size:15px;color:#fff}
.warn{color:#f6b09b;font-size:12px}
.gold{color:#e9cb78}
.dim{opacity:.7;font-size:12px}
.fb-acc{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px;align-items:flex-end}
.accLabel{flex-basis:100%;font-size:9.5px;letter-spacing:.15em;color:rgba(239,233,214,.5);margin-bottom:1px}
.chipwrap{display:inline-flex;align-items:flex-end;gap:2px}
.chip-n{font-size:10px;color:rgba(239,233,214,.85);font-variant-numeric:tabular-nums}
.chip-n.total{margin-left:6px;font-size:11px;color:#e9cb78}
#handArea{margin-top:4px}
#hand{display:flex;align-items:flex-end;gap:2px}
#hand.lock{pointer-events:none;opacity:.92}
.tile{flex:1 1 0;min-width:0;aspect-ratio:.72;background:linear-gradient(180deg,#fffef6 0%,#f6efdb 68%,#e6dcbe 100%);border:0;border-radius:5px;box-shadow:0 2px 0 #b3a781,0 3px 6px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:0}
.tile .face{width:94%;height:94%;object-fit:contain;pointer-events:none;-webkit-user-drag:none;user-select:none;display:block}
button.tile{cursor:pointer;transition:transform .1s ease}
button.tile:active{transform:translateY(-7px)}
.tsumo{margin-left:9px;animation:drawIn .22s ease}
@keyframes drawIn{from{transform:translateY(-10px);opacity:0}to{transform:none;opacity:1}}
.tile.sm,.tile.md{flex:none;border-radius:3px;box-shadow:0 1px 0 #b3a781,0 1px 3px rgba(0,0,0,.35)}
.tile.sm{width:24px}
.tile.md{width:28px}
#river .tile:last-child{animation:drop .2s ease}
@keyframes drop{from{transform:translateY(-6px) scale(1.15);opacity:.4}to{transform:none;opacity:1}}
@media (prefers-reduced-motion: reduce){
  #fb.show,.tsumo,#river .tile:last-child,.card{animation:none !important}
  button.tile{transition:none}
}
#overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(4,16,13,.8);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:10;padding:20px}
#overlay.show{display:flex}
.card{width:100%;max-width:400px;background:linear-gradient(180deg,#16493b,#0c352b);border:1px solid rgba(217,185,108,.5);border-radius:18px;padding:26px 20px 20px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.55);animation:rise .25s ease}
.card h2{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;letter-spacing:.18em;text-indent:.18em;color:#ecdfb4;font-size:21px;font-weight:600}
.bigpct{font-size:48px;font-weight:800;color:#fff;margin-top:8px;line-height:1;font-variant-numeric:tabular-nums}
.pctu{font-size:20px;font-weight:600;color:rgba(255,255,255,.7);margin-left:2px}
.rank{display:inline-block;margin-top:10px;border:1px solid #d9b96c;color:#ecd9a0;border-radius:999px;padding:4px 16px;font-size:12px;letter-spacing:.3em;text-indent:.3em}
.card .sub{color:rgba(239,233,214,.65);font-size:11.5px;margin-top:10px;letter-spacing:.08em}
.fin-hand{display:flex;gap:2px;justify-content:center;margin:12px 0 4px;flex-wrap:wrap}
.waits{display:flex;gap:5px;justify-content:center;align-items:flex-end;flex-wrap:wrap;margin-top:5px}
#again{margin-top:18px;width:100%;padding:13px;border-radius:12px;border:0;background:#d9b96c;color:#2c2410;font-weight:800;font-size:15px;letter-spacing:.25em;text-indent:.25em;cursor:pointer}
#seeBoard{margin-top:8px;width:100%;padding:9px;border-radius:12px;border:1px solid rgba(236,223,180,.35);background:none;color:#cfc6a6;font-size:12px;letter-spacing:.1em;cursor:pointer}
.linkish{background:none;border:0;color:#cfc6a6;text-decoration:underline;font-size:12px;cursor:pointer;padding:4px}
button:focus-visible{outline:2px solid #e9cb78;outline-offset:2px}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>麻雀お嬢様</h1>
    <button id="reset" type="button">↺ 配り直しですわ</button>
  </header>
  <div id="stats">
    <div class="stat"><div class="v" id="stTurn">1</div><div class="k">巡目</div></div>
    <div class="stat"><div class="v" id="stShanten">-</div><div class="k">向聴</div></div>
    <div class="stat"><div class="v" id="stScore">0/0</div><div class="k">正解</div></div>
    <div class="stat"><div class="v" id="stRate">--</div><div class="k">正答率</div></div>
  </div>
  <div class="secLabel"><span>お河（お捨て牌）</span><span id="wallCnt"></span></div>
  <div id="river"></div>
  <div id="fbWrap">
    <div id="hint">ごきげんよう｡14枚の中から1枚をタップしてお捨てになってくださいまし｡<br>受け入れ枚数（有効牌の残り数）が最大の打牌が正解ですわ｡<br>聴牌まで続けて正答率を測りますわよ｡</div>
    <div id="fb"></div>
  </div>
  <div id="handArea">
    <div class="secLabel"><span>お手牌</span><span id="tsumoLabel">右端がツモ牌ですわ</span></div>
    <div id="hand"></div>
  </div>
</div>
<div id="overlay">
  <div class="card" id="resultCard"></div>
</div>
<script>
'use strict';
/* ========== 牌効率エンジン ==========
   牌ID: 0-8=1-9萬, 9-17=1-9筒, 18-26=1-9索, 27-33=東南西北白發中 */

var YAOCHU = [0, 8, 9, 17, 18, 26, 27, 28, 29, 30, 31, 32, 33];

function countsOf(tiles) {
  var c = new Array(34).fill(0);
  for (var k = 0; k < tiles.length; k++) c[tiles[k]]++;
  return c;
}

/* 七対子向聴 */
function shantenChiitoi(c) {
  var pairs = 0, kinds = 0;
  for (var i = 0; i < 34; i++) {
    if (c[i] > 0) kinds++;
    if (c[i] >= 2) pairs++;
  }
  return 6 - pairs + Math.max(0, 7 - kinds);
}

/* 国士無双向聴 */
function shantenKokushi(c) {
  var kinds = 0, pair = 0;
  for (var k = 0; k < YAOCHU.length; k++) {
    var i = YAOCHU[k];
    if (c[i] > 0) kinds++;
    if (c[i] >= 2) pair = 1;
  }
  return 13 - kinds - pair;
}

/* 一般形向聴: 8 - 2*面子 - 搭子 - 雀頭, 面子+搭子<=4, 雀頭<=1 */
function shantenNormal(c) {
  var w = c.slice();
  var best = 8;
  var total = 0;
  for (var i = 0; i < 34; i++) total += w[i];

  function dfs(i, m, t, p, q) {
    var score = 8 - 2 * m - t - p;
    var room = Math.min(2 * (4 - m - t) + (1 - p), (2 * q / 3) | 0);
    if (score - room >= best) return; // 枝刈り: これ以上改善不能
    while (i < 34 && w[i] === 0) i++;
    if (i >= 34) { if (score < best) best = score; return; }
    // この牌種の残りを全て浮き牌として確定
    dfs(i + 1, m, t, p, q - w[i]);
    // 刻子
    if (w[i] >= 3 && m < 4) { w[i] -= 3; dfs(i, m + 1, t, p, q - 3); w[i] += 3; }
    // 雀頭
    if (w[i] >= 2 && p === 0) { w[i] -= 2; dfs(i, m, t, 1, q - 2); w[i] += 2; }
    // 対子搭子(刻子の種)
    if (w[i] >= 2 && m + t < 4) { w[i] -= 2; dfs(i, m, t + 1, p, q - 2); w[i] += 2; }
    if (i < 27 && i % 9 <= 6) {
      // 順子
      if (w[i + 1] > 0 && w[i + 2] > 0 && m < 4) {
        w[i]--; w[i + 1]--; w[i + 2]--;
        dfs(i, m + 1, t, p, q - 3);
        w[i]++; w[i + 1]++; w[i + 2]++;
      }
      // 嵌張搭子
      if (w[i + 2] > 0 && m + t < 4) {
        w[i]--; w[i + 2]--;
        dfs(i, m, t + 1, p, q - 2);
        w[i]++; w[i + 2]++;
      }
    }
    // 両面・辺張搭子
    if (i < 27 && i % 9 <= 7 && w[i + 1] > 0 && m + t < 4) {
      w[i]--; w[i + 1]--;
      dfs(i, m, t + 1, p, q - 2);
      w[i]++; w[i + 1]++;
    }
  }
  dfs(0, 0, 0, 0, total);
  return best;
}

function shanten(c) {
  var a = shantenNormal(c);
  var b = shantenChiitoi(c);
  var k = shantenKokushi(c);
  return Math.min(a, b, k);
}

/* 13枚手牌の受け入れ計算
   c13: 手牌カウント / visC: 見えている牌(河)のカウント
   戻り値: { shanten, total(受け入れ総枚数), accepts: [[牌ID, 残枚数], ...] } */
function calcUkeire(c13, visC) {
  var base = shanten(c13);
  var total = 0;
  var accepts = [];
  for (var t = 0; t < 34; t++) {
    var rem = 4 - c13[t] - visC[t];
    if (rem <= 0) continue;
    c13[t]++;
    var s = shanten(c13);
    c13[t]--;
    if (s < base) { total += rem; accepts.push([t, rem]); }
  }
  return { shanten: base, total: total, accepts: accepts };
}

/* 14枚手牌の全打牌候補を評価
   正解 = 向聴数最小を維持しつつ受け入れ枚数最大の打牌(同数は全て正解) */
function evaluateDiscards(c14, discC) {
  var res = [];
  for (var d = 0; d < 34; d++) {
    if (c14[d] === 0) continue;
    c14[d]--; discC[d]++;
    var r = calcUkeire(c14, discC);
    discC[d]--; c14[d]++;
    res.push({ d: d, shanten: r.shanten, total: r.total, accepts: r.accepts });
  }
  var minSh = 99, maxUk = -1, i;
  for (i = 0; i < res.length; i++) if (res[i].shanten < minSh) minSh = res[i].shanten;
  for (i = 0; i < res.length; i++) if (res[i].shanten === minSh && res[i].total > maxUk) maxUk = res[i].total;
  var best = [];
  for (i = 0; i < res.length; i++) if (res[i].shanten === minSh && res[i].total === maxUk) best.push(res[i].d);
  return { res: res, minSh: minSh, maxUk: maxUk, best: best };
}

/* テスト用パーサ: "123m456p7z" 形式 */
function parseHand(str) {
  var tiles = [];
  var digits = '';
  var base = { m: 0, p: 9, s: 18, z: 27 };
  for (var k = 0; k < str.length; k++) {
    var ch = str[k];
    if (ch >= '1' && ch <= '9') digits += ch;
    else if (ch in base) {
      for (var j = 0; j < digits.length; j++) tiles.push(base[ch] + (+digits[j] - 1));
      digits = '';
    }
  }
  return tiles;
}

if (typeof module !== 'undefined' && module.exports) {
  module.exports = {
    countsOf: countsOf, shanten: shanten, shantenNormal: shantenNormal,
    shantenChiitoi: shantenChiitoi, shantenKokushi: shantenKokushi,
    calcUkeire: calcUkeire, evaluateDiscards: evaluateDiscards, parseHand: parseHand
  };
}

'use strict';
/* ========== ゲームUI ========== */
var HONOR_CHARS = ['東', '南', '西', '北', '白', '發', '中'];
var SUIT_CHARS = ['萬', '筒', '索'];
function $(id) { return document.getElementById(id); }
var HINT_HTML = $('hint').innerHTML;

var wall = [], hand = [], drawnTile = null, discards = [];
var stats = { correct: 0, total: 0 };
var evalCur = null, busy = false, finished = false, endState = null;

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = (Math.random() * (i + 1)) | 0;
    var x = a[i]; a[i] = a[j]; a[j] = x;
  }
}

function tileLabel(t) { return t < 27 ? (t % 9 + 1) + 'mps'[(t / 9) | 0] : HONOR_CHARS[t - 27]; }

function tileFace(t) {
  return '<img class="face" src="' + TILE_FACES[t] + '" alt="" draggable="false">';
}
function tileDiv(t, extra) {
  return '<div class="tile' + (extra ? ' ' + extra : '') + '">' + tileFace(t) + '</div>';
}
function tileBtn(t, attrs, extra) {
  return '<button type="button" class="tile' + (extra ? ' ' + extra : '') + '" ' + attrs + ' aria-label="' + tileLabel(t) + '">' + tileFace(t) + '</button>';
}
function chipList(accepts) {
  return accepts.map(function (a) {
    return '<span class="chipwrap">' + tileDiv(a[0], 'sm') + '<span class="chip-n">×' + a[1] + '</span></span>';
  }).join('');
}

function newGame() {
  var guard = 0;
  do {
    wall = [];
    for (var t = 0; t < 34; t++) for (var k = 0; k < 4; k++) wall.push(t);
    shuffle(wall);
    hand = wall.splice(0, 13).sort(function (a, b) { return a - b; });
    drawnTile = wall.pop();
    evalCur = evaluateDiscards(countsOf(hand.concat(drawnTile)), countsOf([]));
  } while (evalCur.minSh <= 0 && ++guard < 50); // 即聴牌の配牌は引き直し
  discards = [];
  stats = { correct: 0, total: 0 };
  finished = false; busy = false; endState = null;
  $('overlay').classList.remove('show');
  $('fb').className = '';
  $('hint').innerHTML = HINT_HTML;
  $('hint').style.display = '';
  $('hand').classList.remove('lock');
  render();
}

function render() {
  $('stTurn').textContent = finished ? stats.total : stats.total + 1;
  var shEl = $('stShanten');
  if (finished) {
    shEl.textContent = endState === 'tenpai' ? '聴牌' : '流局';
    shEl.style.color = '#e9cb78';
  } else {
    shEl.textContent = evalCur.minSh === 0 ? '聴牌可' : evalCur.minSh;
    shEl.style.color = evalCur.minSh === 0 ? '#e9cb78' : '';
  }
  $('stScore').textContent = stats.correct + '/' + stats.total;
  $('stRate').textContent = stats.total ? Math.round(100 * stats.correct / stats.total) + '%' : '--';
  $('wallCnt').textContent = 'お山 ' + wall.length + '枚ですわ';
  renderRiver();
  renderHand();
}

function renderRiver() {
  var rv = $('river');
  rv.innerHTML = discards.length
    ? discards.map(function (t) { return tileDiv(t, 'sm'); }).join('')
    : '<span class="empty">まだ何もお捨てになっていませんわ</span>';
  rv.scrollTop = rv.scrollHeight;
}

function renderHand() {
  var html = hand.map(function (t, i) { return tileBtn(t, 'data-i="' + i + '"'); }).join('');
  if (!finished && drawnTile !== null) html += tileBtn(drawnTile, 'data-i="tsumo"', 'tsumo');
  $('hand').innerHTML = html;
  $('tsumoLabel').style.display = finished ? 'none' : '';
}

function showFeedback(ok, tile, r) {
  $('hint').style.display = 'none';
  var fb = $('fb');
  var minSh = evalCur.minSh;
  var bestR = null;
  for (var i = 0; i < evalCur.res.length; i++) if (evalCur.res[i].d === evalCur.best[0]) bestR = evalCur.res[i];
  var showR = ok ? r : bestR;
  var body = '';
  if (r.shanten > minSh) {
    body += '<div class="fb-line">打' + tileDiv(tile, 'md') +
      '<span class="warn">' + r.shanten + '向聴に後退ですわ…（最善は' + (minSh === 0 ? '聴牌' : minSh + '向聴') + 'でしてよ）</span></div>';
  } else {
    body += '<div class="fb-line">打' + tileDiv(tile, 'md') +
      (r.shanten === 0 ? 'で<b class="gold">聴牌</b>・お待ち' : 'で受け入れ') + '<b>' + r.total + '</b>枚ですわ</div>';
  }
  if (!ok) {
    var bestTiles = evalCur.best.map(function (d) { return tileDiv(d, 'md'); }).join('');
    body += '<div class="fb-line">最善は' + bestTiles +
      (minSh === 0 ? 'で<b class="gold">聴牌</b>・お待ち' : 'で受け入れ') + '<b>' + evalCur.maxUk + '</b>枚でしてよ</div>';
  } else if (evalCur.best.length > 1) {
    var others = evalCur.best.filter(function (d) { return d !== tile; })
      .map(function (d) { return tileDiv(d, 'sm'); }).join('');
    body += '<div class="fb-line dim">こちらも正解ですわ' + others + '</div>';
  }
  body += '<div class="fb-acc"><span class="accLabel">' + (ok ? 'この打牌' : '最善打') + 'の' +
    (minSh === 0 ? 'お待ち牌' : '有効牌') + 'ですわ</span>' + chipList(showR.accepts) +
    '<span class="chip-n total">計' + showR.total + '枚ですの</span></div>';
  fb.className = '';
  void fb.offsetWidth;
  fb.innerHTML = '<div class="fb-head">' + (ok ? '◯ お見事ですわ！' : '✕ いけませんわね…') +
    '<span class="fb-sub">' + stats.total + '巡目のご判定ですわ</span></div>' + body;
  fb.className = 'show ' + (ok ? 'ok' : 'ng');
}

function showResult(finalR) {
  var pct = stats.total ? Math.round(100 * stats.correct / stats.total) : 0;
  var rank = pct >= 90 ? '真のお嬢様' : pct >= 75 ? '立派なお嬢様' : pct >= 60 ? '見習いお嬢様' : pct >= 40 ? 'お嬢様修行中' : 'はしたなくってよ';
  var handHTML = hand.map(function (t) { return tileDiv(t, 'sm'); }).join('');
  var waits = finalR
    ? '<div class="sub">お待ち牌はこちらですわ</div><div class="waits">' + chipList(finalR.accepts) +
      '<span class="chip-n total">計' + finalR.total + '枚ですの</span></div>'
    : '<div class="sub">お山が尽きてしまいましたわ…</div>';
  $('resultCard').innerHTML =
    '<h2>' + (finalR ? '聴牌ですわ〜！' : '流局ですわ…') + '</h2>' +
    '<div class="bigpct">' + pct + '<span class="pctu">%</span></div>' +
    '<div class="rank">' + rank + '</div>' +
    '<div class="sub">' + stats.total + '巡中､' + stats.correct + '回の正解ですわ</div>' +
    '<div class="fin-hand">' + handHTML + '</div>' + waits +
    '<button id="again" type="button">もう一局ですわ</button>' +
    '<button id="seeBoard" type="button">盤面を拝見しますわ</button>';
  $('overlay').classList.add('show');
  $('again').addEventListener('click', newGame);
  $('seeBoard').addEventListener('click', function () {
    $('overlay').classList.remove('show');
    $('hint').style.display = '';
    $('hint').innerHTML = '<button class="linkish" id="reopen" type="button">結果をもう一度ですわ</button>';
    $('reopen').addEventListener('click', function () { $('overlay').classList.add('show'); });
  });
}

function onDiscard(tile) {
  if (busy || finished) return;
  busy = true;
  var r = null;
  for (var i = 0; i < evalCur.res.length; i++) if (evalCur.res[i].d === tile) r = evalCur.res[i];
  var ok = evalCur.best.indexOf(tile) !== -1;
  stats.total++;
  if (ok) stats.correct++;
  if (navigator.vibrate) navigator.vibrate(ok ? 12 : [25, 35, 25]);
  showFeedback(ok, tile, r);
  var all = hand.concat(drawnTile);
  all.splice(all.indexOf(tile), 1);
  hand = all.sort(function (a, b) { return a - b; });
  discards.push(tile);
  drawnTile = null;
  if (r.shanten === 0) {
    finished = true; endState = 'tenpai';
    $('hand').classList.add('lock');
    render();
    showResult(r);
    busy = false;
    return;
  }
  if (wall.length === 0) {
    finished = true; endState = 'ryuukyoku';
    $('hand').classList.add('lock');
    render();
    showResult(null);
    busy = false;
    return;
  }
  drawnTile = wall.pop();
  evalCur = evaluateDiscards(countsOf(hand.concat(drawnTile)), countsOf(discards));
  render();
  busy = false;
}

$('hand').addEventListener('click', function (e) {
  var b = e.target.closest('button.tile');
  if (!b) return;
  var key = b.getAttribute('data-i');
  onDiscard(key === 'tsumo' ? drawnTile : hand[+key]);
});
$('reset').addEventListener('click', newGame);

window._dbg = function () {
  return { wall: wall, hand: hand, drawnTile: drawnTile, discards: discards, stats: stats, evalCur: evalCur, finished: finished };
};

newGame();
</script>
</body>
</html>
