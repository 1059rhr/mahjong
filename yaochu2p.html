<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ヤオチュー麻雀</title>
<style>
:root{
  --felt:#173f31; --felt2:#0f2d22; --line:#2b5a47;
  --ivory:#f7f3e6; --ivory2:#e9e2cd; --ink:#1c1a16;
  --man:#b03030; --pin:#1d55a8; --sou:#1e7a3c;
  --gold:#d8b25a; --accent:#e8c977; --warn:#e07a5f;
  --htw:min(34px,calc((min(100vw,520px) - 52px)/14));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--felt2);color:var(--ivory);
  font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
  -webkit-user-select:none;user-select:none;touch-action:manipulation}
#app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
  background:
   radial-gradient(120% 60% at 50% 0%,rgba(255,255,255,.05),transparent 60%),
   var(--felt);
  padding:6px 8px calc(10px + env(safe-area-inset-bottom))}
.pbar{display:flex;align-items:center;gap:8px;padding:4px 6px;font-size:13px}
.pbar .nm{font-weight:700}
.pbar .wind{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;
  border-radius:4px;background:var(--felt2);border:1px solid var(--line);font-size:12px}
.pbar .wind.dealer{background:var(--warn);color:#fff;border-color:transparent}
.pbar .sc{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:700;font-size:15px}
.pbar .sc.minus{color:var(--warn)}
.badge{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--gold);color:#3a2c0a;font-weight:700}
.badge.ft{background:var(--warn);color:#fff}
.river{display:flex;flex-wrap:wrap;gap:0;justify-content:flex-start;align-items:flex-end;
  align-content:flex-start;height:103px;padding:2px 0;width:156px;margin:0 auto}
.melds{display:flex;gap:8px;justify-content:flex-end;min-height:0;padding:0 4px;flex-wrap:wrap}
#pMelds{min-height:41px;align-items:flex-end}
#cpuMelds{min-height:49px;align-items:flex-end}
.meld{display:flex;gap:1px;align-items:flex-end}
.tile{width:34px;height:46px;border-radius:5px;background:linear-gradient(180deg,#fffdf4,var(--ivory) 55%,var(--ivory2));
  border:1px solid #b9ae8e;box-shadow:0 2px 0 #a99e7f,0 3px 4px rgba(0,0,0,.35);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--ink);line-height:1;position:relative;flex:none}
.tile .face{width:92%;height:92%;object-fit:contain;pointer-events:none;-webkit-user-drag:none;user-select:none;display:block}
a.iconbtn{text-decoration:none;display:inline-flex;align-items:center}
.tile .n{font-size:17px;font-weight:800}
.tile .s{font-size:11px;font-weight:700;margin-top:1px}
.tile .z{font-size:19px;font-weight:800}
.tile.m .n,.tile.m .s{color:var(--man)}
.tile.p .n,.tile.p .s{color:var(--pin)}
.tile.s .n,.tile.s .s{color:var(--sou)}
.tile.zw .z{color:#2a2a2a}
.tile.zd-h .z{color:#9a9a8c}
.tile.zd-g .z{color:var(--sou)}
.tile.zd-r .z{color:var(--man)}
.tile.sm{width:30px;height:41px}
.tile.sm .n{font-size:15px}.tile.sm .z{font-size:16px}.tile.sm .s{font-size:10px}
.tile.xs{width:24px;height:33px;border-radius:4px}
.tile.xs .n{font-size:12px}.tile.xs .z{font-size:13px}.tile.xs .s{font-size:8px}
.tile.xxs{width:20px;height:27px;border-radius:3px}
.tile.back{background:linear-gradient(180deg,#3f6f58,#2c523f);border-color:#1e3a2d;
  box-shadow:0 2px 0 #16281f,0 3px 4px rgba(0,0,0,.35)}
.tile.side{width:46px;height:34px}
.tile.sm.side{width:41px;height:30px}
.tile.xs.side{width:33px;height:24px}
.tile.xxs.side{width:27px;height:20px}
.tile.side .face{transform:rotate(90deg);width:31px;height:42px}
.tile.sm.side .face{width:28px;height:38px}
.tile.xs.side .face{width:22px;height:30px}
.tile.xxs.side .face{width:18px;height:25px}
.tile.flip .face{transform:rotate(180deg)}
.tile.side.flip .face{transform:rotate(270deg)}
.river .tile.xs.side{margin-top:9px}
#cpuRiver{transform:rotate(180deg)}
#cpuRiver .tile{background:linear-gradient(0deg,#fffdf4,var(--ivory) 55%,var(--ivory2));box-shadow:0 -2px 0 #a99e7f,0 -3px 4px rgba(0,0,0,.35)}
.kstack{display:flex;flex-direction:column;gap:1px;justify-content:flex-end}
.tile.called{opacity:.35}
.tile.win{outline:3px solid var(--accent);outline-offset:-1px}
button.tileBtn{padding:0;margin:0;border:none;background:none;font:inherit}
#pHand{display:flex;gap:0;justify-content:flex-start;align-items:flex-end;flex-wrap:nowrap;
  padding:8px 2px 4px;min-height:64px}
#pHand .tile{width:var(--htw);height:calc(var(--htw)*1.36)}
#pHand .drawnGap{margin-left:3px;flex:none}
#pHand .tile.sel{transform:translateY(-8px)}
#pHand .tile.dim{opacity:.35}
#center{width:330px;max-width:100%;margin:2px auto;padding:8px 12px;border:1px solid var(--line);border-radius:10px;
  background:rgba(0,0,0,.22);display:flex;flex-direction:column;gap:6px}
#center .row1{display:flex;align-items:center;gap:14px;font-size:13px;justify-content:center;white-space:nowrap}
#center .rname{font-size:16px;font-weight:800;letter-spacing:.05em;white-space:nowrap}
#center .kv{opacity:.9;font-variant-numeric:tabular-nums;white-space:nowrap}
#center .spacer{margin-left:auto;display:flex;gap:6px}
#center .row2{display:flex;align-items:center;gap:8px;justify-content:center}
#doraRow{display:flex;gap:0}
#doraRow .tile{width:24px;height:33px;flex:none}
#center .lbl{font-size:10px;opacity:.75;letter-spacing:.1em}
header{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 8px}
#hdrBtns{display:flex;gap:6px}
#hdrBtns button{background:none;border:1px solid rgba(236,223,180,.4);color:var(--ivory);border-radius:999px;font-size:11px;padding:5px 12px;letter-spacing:.05em;cursor:pointer}
h1{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;font-size:17px;font-weight:600;letter-spacing:.18em;color:var(--ivory);margin:0}
#home{background:none;border:1px solid rgba(236,223,180,.4);color:var(--ivory);border-radius:999px;font-size:11px;padding:5px 12px;letter-spacing:.05em;cursor:pointer}
.iconbtn{font-size:11px;padding:5px 9px;border-radius:6px;border:1px solid var(--line);
  background:var(--felt2);color:var(--ivory);font-weight:700}
#actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;min-height:52px;
  align-items:center;padding:6px 0 2px}
#actions .btn{font-size:16px;font-weight:800;padding:11px 18px;border-radius:9px;border:none;
  color:#241c08;background:linear-gradient(180deg,#f0d78c,var(--gold));
  box-shadow:0 3px 0 #a8862f,0 4px 8px rgba(0,0,0,.4)}
#actions .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #a8862f}
#actions .btn.sub{background:linear-gradient(180deg,#4c7a63,#38604c);color:var(--ivory);box-shadow:0 3px 0 #24402f}
#actions .hint{font-size:12px;opacity:.85}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;
  justify-content:center;z-index:40;padding:14px}
#overlay[hidden]{display:none}
#ovBox{background:#20463a;border:1px solid var(--line);border-radius:14px;max-width:480px;width:100%;
  max-height:86dvh;overflow-y:auto;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
#ovBox h2{margin:0 0 8px;font-size:18px;letter-spacing:.06em}
.ovCloseWrap{position:sticky;top:0;height:0;z-index:5;display:flex;justify-content:flex-end;pointer-events:none}
.ovClose{pointer-events:auto;width:30px;height:30px;margin:-4px -4px 0 0;border-radius:50%;border:1px solid rgba(236,223,180,.35);background:rgba(20,40,32,.92);color:var(--ivory);font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.ovClose:active{transform:scale(.92)}
#introHint{position:absolute;left:50%;top:0;transform:translateX(-50%);width:300px;max-width:92vw;border:1px dashed rgba(236,223,180,.4);border-radius:12px;padding:12px 14px;font-size:12px;line-height:1.9;color:rgba(239,233,214,.85);background:rgba(0,0,0,.28);box-sizing:border-box;pointer-events:none;z-index:3}
#pRiver{position:relative}
#app:not(.intro) #introHint{display:none}
#ovBox.fixed{height:min(540px,86dvh);display:flex;flex-direction:column;overflow:hidden}
#ovBox.fixed .ylist{flex:1 1 auto;min-height:0;overflow-y:auto;margin-top:4px}
#ovBox.fixed .rfoot{flex:none;display:flex;flex-direction:column;margin-top:6px}
#ovBox .rfoot .rtotal{height:96px;display:flex;flex-direction:column;justify-content:center}
#ovBox .rfoot .rtotal .total{margin:0}
#ovBox .rfoot .rscore{height:52px}
#ovBox .rfoot .rbtn{height:62px;display:flex;align-items:flex-end;justify-content:center}
#ovBox .ylist{display:flex;gap:14px;align-items:flex-start}
#ovBox .ylist .ycol{flex:1 1 0;min-width:0}
#ovBox .yline{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;
  border-bottom:1px dashed rgba(255,255,255,.12)}
#ovBox .total{font-size:20px;font-weight:800;text-align:center;margin:12px 0 4px;color:var(--accent)}
#ovBox .handrow{display:flex;gap:0;flex-wrap:wrap;margin:8px 0;align-items:center}
#ovBox .obtns{display:flex;gap:10px;justify-content:center;margin-top:14px}
#ovBox .obtns .btn{font-size:15px;font-weight:800;padding:10px 20px;border-radius:9px;border:none;
  color:#241c08;background:linear-gradient(180deg,#f0d78c,var(--gold))}
#ovBox .obtns .btn.sub{background:#38604c;color:var(--ivory)}
#ovBox.confirm{background:linear-gradient(180deg,#16493b,#0c352b);border:1px solid rgba(217,185,108,.5);border-radius:18px;max-width:400px;padding:26px 20px 20px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.55)}
#ovBox.confirm h2{font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif;letter-spacing:.18em;text-indent:.18em;color:#ecdfb4;font-size:21px;font-weight:600;margin:0}
#ovBox.confirm .csub{color:rgba(239,233,214,.65);font-size:11.5px;margin-top:10px;letter-spacing:.08em;line-height:1.7}
#ovBox.confirm .obtns{flex-direction:column;gap:8px;margin-top:18px}
#ovBox.confirm .obtns .btn{width:100%;margin:0;padding:13px;border-radius:12px;border:0;background:#d9b96c;color:#2c2410;font-weight:800;font-size:15px;letter-spacing:.25em;text-indent:.25em;box-shadow:none}
#ovBox.confirm .obtns .btn.sub{padding:9px;border:1px solid rgba(236,223,180,.35);background:none;color:#cfc6a6;font-size:12px;font-weight:400;letter-spacing:.1em}
.achGrid{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.ach{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:8px;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.07);font-size:13px}
.ach .mk{width:22px;height:22px;border-radius:50%;flex:none;display:flex;align-items:center;
  justify-content:center;font-size:13px;background:#173226;color:#5d806f}
.ach.on{border-color:var(--gold);background:rgba(216,178,90,.12)}
.ach.on .mk{background:var(--gold);color:#3a2c0a}
.ach .an{font-weight:700}
.ach .ad{opacity:.7;font-size:11px;margin-left:auto;text-align:right}
#toasts{position:fixed;left:0;right:0;top:10px;display:flex;flex-direction:column;gap:6px;
  align-items:center;z-index:60;pointer-events:none}
.toast{background:linear-gradient(180deg,#f0d78c,var(--gold));color:#3a2c0a;font-weight:800;
  padding:9px 16px;border-radius:24px;font-size:14px;box-shadow:0 6px 18px rgba(0,0,0,.5);
  animation:tin .25s ease-out}
@keyframes tin{from{transform:translateY(-14px);opacity:0}to{transform:none;opacity:1}}
.callout{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:55;pointer-events:none}
.callout.top{align-items:flex-start;padding-top:14dvh}
.callout.bottom{align-items:flex-end;padding-bottom:28dvh}
.callout span{font-size:60px;font-weight:900;color:var(--accent);
  -webkit-text-stroke:2px #2a1f06;letter-spacing:.12em;
  text-shadow:0 6px 30px rgba(0,0,0,.7);
  animation:coPop .95s cubic-bezier(.2,1.5,.4,1) both}
@keyframes coPop{0%{transform:scale(.25);opacity:0}22%{transform:scale(1.18);opacity:1}
  38%{transform:scale(1)}78%{opacity:1}100%{opacity:0}}
#ovBox .yline{animation:lineIn .25s ease-out both}
@keyframes lineIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
#ovBox .total .sub{display:block;font-size:13px;font-weight:700;color:#8fae9c;margin-bottom:2px}
#ovBox .total .pts{font-size:32px;font-weight:900;color:var(--accent);display:inline-block}
#ovBox .total.t1 .pts{animation:ptsIn .55s cubic-bezier(.2,1.6,.4,1)}
#ovBox .total.t2 .pts{font-size:34px;animation:ptsIn .55s cubic-bezier(.2,1.6,.4,1),ptsGlow 1.6s ease-in-out .6s infinite}
#ovBox .total.t3 .pts{font-size:36px;animation:ptsIn .6s cubic-bezier(.2,1.7,.4,1),ptsGlow 1.1s ease-in-out .6s infinite}
#ovBox .total.t4 .pts{font-size:38px;animation:ptsIn .65s cubic-bezier(.2,1.8,.4,1),ptsGlow .85s ease-in-out .7s infinite,ptsShake 2.4s ease-in-out .9s infinite}
#ovBox .total.t5 .pts{font-size:41px;text-shadow:0 0 14px rgba(255,205,90,.9);animation:ptsIn .7s cubic-bezier(.2,1.9,.4,1),ptsHue 1.8s linear .8s infinite}
#ovBox .total.t6 .pts{font-size:44px;text-shadow:0 0 18px rgba(255,140,140,.95);animation:ptsIn .7s cubic-bezier(.2,2,.4,1),ptsHue .9s linear .8s infinite}
@keyframes ptsIn{0%{transform:scale(.3);opacity:0}55%{transform:scale(1.35)}80%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes ptsGlow{0%,100%{text-shadow:0 0 4px rgba(255,205,90,.3)}50%{text-shadow:0 0 16px rgba(255,205,90,.95)}}
@keyframes ptsShake{0%,86%,100%{transform:none}89%{transform:translateX(-2px)}93%{transform:translateX(2px)}97%{transform:translateX(-1px)}}
@keyframes ptsHue{0%{filter:hue-rotate(0)}100%{filter:hue-rotate(360deg)}}
#ovBox .total .sub2{font-size:12px;font-weight:700;color:#8fae9c;margin-left:8px}
.stick{display:inline-block;width:34px;height:7px;border-radius:4px;background:var(--ivory);
  position:relative;vertical-align:middle}
.stick::after{content:"";position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px;
  border-radius:50%;background:var(--man)}
.turnDot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;
  box-shadow:0 0 8px var(--accent)}
.turnDot.off{background:transparent;box-shadow:none;border:1px solid var(--line)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>ヤオチュー麻雀</h1>
    <div id="hdrBtns">
      <button id="newBtn" type="button">新規</button>
      <button id="achBtn" type="button">実績</button>
      <button id="homeBtn" type="button">⌂ トップへ</button>
    </div>
  </header>
  <div class="pbar" id="cpuBar"></div>
  <div class="melds" id="cpuMelds"></div>
  <div class="river" id="cpuRiver"></div>
  <div id="center">
    <div class="row1">
      <span class="rname" id="roundName"></span>
      <span class="kv" id="honbaPot"></span>
      <span class="kv" id="wallCnt"></span>
    </div>
    <div class="row2">
      <span class="lbl">ドラ</span>
      <div id="doraRow"></div>
    </div>
  </div>
  <div class="river" id="pRiver"><div id="introHint">ごきげんよう｡1･9･字牌の么九牌だけで戦う二人麻雀ですわ｡<br>中張牌は使いませんの｡不要牌を切り､相手の捨て牌か自摸で和了なさってくださいまし｡<br>么九牌のみゆえ役は大きく育ちますのよ｡</div></div>
  <div class="melds" id="pMelds"></div>
  <div class="pbar" id="pBar"></div>
  <div id="pHand"></div>
  <div id="actions"></div>
</div>
<div id="overlay" hidden><div id="ovBox"></div></div>
<div id="toasts"></div>
<script>
"use strict";
const TT=[
 {n:"1",s:"萬",c:"m"},{n:"9",s:"萬",c:"m"},
 {n:"1",s:"筒",c:"p"},{n:"9",s:"筒",c:"p"},
 {n:"1",s:"索",c:"s"},{n:"9",s:"索",c:"s"},
 {z:"東",c:"zw"},{z:"南",c:"zw"},{z:"西",c:"zw"},{z:"北",c:"zw"},
 {z:"白",c:"zd-h"},{z:"發",c:"zd-g"},{z:"中",c:"zd-r"}
];
const DRAGONS=[10,11,12],WINDS=[6,7,8,9];
function doraFromIndicator(i){ if(i<6)return i^1; if(i<10)return i===9?6:i+1; return i===12?10:i+1; }
function emptyCounts(){ return new Array(13).fill(0); }
function countsOf(arr){ const c=emptyCounts(); for(const t of arr)c[t]++; return c; }
function winStd(c,m){ let pair=0,sets=0;
  for(let t=0;t<13;t++){ const v=c[t]; if(v===0)continue;
    if(v===2)pair++; else if(v===3)sets++; else return false; }
  return pair===1&&sets===(4-m); }
function winChiitoi(c,m){ if(m>0)return false; let p=0;
  for(let t=0;t<13;t++){ if(c[t]===2)p++; else if(c[t]!==0)return false; }
  return p===7; }
function winKokushi(c,m){ if(m>0)return false; let sum=0;
  for(let t=0;t<13;t++){ if(c[t]<1)return false; sum+=c[t]; }
  return sum===14; }
function winAny(c,m){ return winStd(c,m)||winChiitoi(c,m)||winKokushi(c,m); }
function shantenStd(c,m){ let S=m,P=0;
  for(let t=0;t<13;t++){ if(c[t]>=3)S++; else if(c[t]===2)P++; }
  if(S>4){P+=0;S=4;}
  const need=4-S,pfs=Math.min(P,need),headPair=P>pfs?1:0;
  return (need-pfs)*2+pfs+(headPair?0:1)-1; }
function shantenChiitoi(c,m){ if(m>0)return 99; let p=0,k=0;
  for(let t=0;t<13;t++){ if(c[t]>=1)k++; if(c[t]>=2)p++; }
  return 6-p+Math.max(0,7-k); }
function shantenKokushi(c,m){ if(m>0)return 99; let k=0,pr=0;
  for(let t=0;t<13;t++){ if(c[t]>=1)k++; if(c[t]>=2)pr=1; }
  return 13-k-pr; }
function shanten(c,m){ return Math.min(shantenStd(c,m),shantenChiitoi(c,m),shantenKokushi(c,m)); }
function waitsOf(c,m){ const w=[];
  for(let t=0;t<13;t++){ if(c[t]>=4)continue; c[t]++; if(winAny(c,m))w.push(t); c[t]--; }
  return w; }
function fuOf(w){
  if(w.chiitoi)return 25;
  let fu=20;
  for(const md of w.melds){ fu+= md.type==="pon"?4 : md.type==="ankan"?32 : 16; }
  for(const t of w.tripletTypes){ fu+= (t===w.ronTriplet)?4:8; }
  const pt=w.pairType;
  if(pt>=10)fu+=2;
  if(pt===w.seatWind)fu+=2;
  if(pt===w.roundWind)fu+=2;
  if(w.waitType==="tanki")fu+=2;
  if(w.tsumo)fu+=2; else if(w.menzen)fu+=10;
  return Math.ceil(fu/10)*10;
}
function basePoints(han,fu,yn){
  if(yn>0)return 8000*yn;
  if(han>=13)return 8000;
  if(han>=11)return 6000;
  if(han>=8)return 4000;
  if(han>=6)return 3000;
  if(han>=5)return 2000;
  const b=fu*Math.pow(2,2+han); return b>=1920?2000:b;
}
function winPoints(han,fu,yn,isDealer){
  return Math.ceil(basePoints(han,fu,yn)*(isDealer?6:4)/100)*100;
}
function limitName(han,fu,yn){
  if(yn>=2)return yn+"倍役満"; if(yn===1)return "役満";
  if(han>=13)return "数え役満"; if(han>=11)return "三倍満";
  if(han>=8)return "倍満"; if(han>=6)return "跳満";
  if(han>=5||basePoints(han,fu,0)>=2000)return "満貫";
  return "";
}
function analyzeWin(o){
  const c=o.counts14,m=o.melds.length;
  const chii=winChiitoi(c,m),kok=winKokushi(c,m),std=winStd(c,m);
  if(!chii&&!kok&&!std)return null;
  const menzen=o.melds.every(x=>x.type==="ankan");
  const pre=c.slice(); pre[o.winTile]--;
  const waitType= kok ? (pre.every(x=>x>=1)?"kokushi13":"kokushi")
                      : (pre[o.winTile]===1?"tanki":"shanpon");
  let tripletTypes=[],pairType=-1;
  if(std){ for(let t=0;t<13;t++){ if(c[t]===3)tripletTypes.push(t); else if(c[t]===2)pairType=t; } }
  const meldTiles=o.melds.map(x=>x.tile);
  const setTypes=tripletTypes.concat(meldTiles);
  const kans=o.melds.filter(x=>x.type!=="pon").length;
  const ronTriplet=(!o.tsumo&&std&&waitType==="shanpon")?o.winTile:-1;
  const ankoCount=o.melds.filter(x=>x.type==="ankan").length
                 +tripletTypes.filter(t=>t!==ronTriplet).length;
  const all=c.slice();
  for(const md of o.melds)all[md.tile]+= md.type==="pon"?3:4;
  let honors=0; const suitSet=new Set();
  for(let t=0;t<13;t++){ if(!all[t])continue; if(t>=6)honors+=all[t]; else suitSet.add(t>>1); }
  const yakuman=[],yaku=[];
  if(o.tenhou)yakuman.push(["tenhou",1]);
  if(o.chihou)yakuman.push(["chihou",1]);
  if(kok)yakuman.push(waitType==="kokushi13"&&!o.furiten?["kokushi13",1]:["kokushi",1]);
  if((std||chii)&&honors>0&&suitSet.size===0)yakuman.push(["tsuuiisou",1]);
  if(std){
    if(suitSet.size>0&&honors===0)yakuman.push(["chinroutou",1]);
    if(kans===4)yakuman.push(["suukantsu",1]);
    if(ankoCount===4)yakuman.push(waitType==="tanki"?["suuankou_tanki",1]:["suuankou",1]);
    const dset=DRAGONS.filter(t=>setTypes.includes(t)).length;
    if(dset===3)yakuman.push(["daisangen",1]);
    const wset=WINDS.filter(t=>setTypes.includes(t)).length;
    if(wset===4)yakuman.push(["daisuushi",1]);
    else if(wset===3&&WINDS.includes(pairType))yakuman.push(["shousuushi",1]);
  }
  const all2=all;
  let doraHan=0; for(const d of o.doraTiles)doraHan+=all2[d];
  let uraHan=0; if(o.riichi||o.doubleRiichi){ for(const d of o.uraTiles)uraHan+=all2[d]; }
  if(yakuman.length){
    const yn=yakuman.reduce((a,x)=>a+x[1],0);
    return {yakuman,yakumanN:yn,yaku:[],han:0,fu:0,doraHan:0,uraHan:0,
            chiitoi:chii,menzen,waitType};
  }
  if(o.doubleRiichi)yaku.push(["dbriichi",2]);
  else if(o.riichi)yaku.push(["riichi",1]);
  if(o.ippatsu)yaku.push(["ippatsu",1]);
  if(o.tsumo&&menzen)yaku.push(["tsumo",1]);
  if(o.rinshan)yaku.push(["rinshan",1]);
  if(o.chankan)yaku.push(["chankan",1]);
  if(o.haitei)yaku.push(["haitei",1]);
  if(o.houtei)yaku.push(["houtei",1]);
  if(chii)yaku.push(["chiitoi",2]);
  if(std){
    yaku.push(["toitoi",2]);
    if(setTypes.includes(10))yaku.push(["haku",1]);
    if(setTypes.includes(11))yaku.push(["hatsu",1]);
    if(setTypes.includes(12))yaku.push(["chun",1]);
    if(setTypes.includes(o.seatWind))yaku.push(["jikaze",1]);
    if(setTypes.includes(o.roundWind))yaku.push(["bakaze",1]);
    if(ankoCount===3)yaku.push(["sanankou",2]);
    if(kans===3)yaku.push(["sankantsu",2]);
    if([0,2,4].every(t=>setTypes.includes(t))||[1,3,5].every(t=>setTypes.includes(t)))
      yaku.push(["sanshokudoukou",2]);
    const dset=DRAGONS.filter(t=>setTypes.includes(t)).length;
    if(dset===2&&DRAGONS.includes(pairType))yaku.push(["shousangen",2]);
  }
  yaku.push(["honroutou",2]);
  if(suitSet.size===1&&honors>0)yaku.push(["honitsu",menzen?3:2]);
  const han=yaku.reduce((a,x)=>a+x[1],0)+doraHan+uraHan;
  const fu=fuOf({chiitoi:chii,melds:o.melds,tripletTypes,ronTriplet,pairType,
    seatWind:o.seatWind,roundWind:o.roundWind,waitType,tsumo:o.tsumo,menzen});
  return {yakuman:[],yakumanN:0,yaku,han,fu,doraHan,uraHan,chiitoi:chii,menzen,waitType};
}
const memStore={};
async function stGet(k){
  try{ if(typeof window!=="undefined"&&window.storage){
    const r=await window.storage.get(k);
    if(r&&r.value!=null)return r.value;
  }}catch(e){}
  try{ const v=localStorage.getItem(k); if(v!=null)return v; }catch(e){}
  return (k in memStore)?memStore[k]:null;
}
async function stSet(k,v){
  memStore[k]=v;
  try{ if(typeof window!=="undefined"&&window.storage){ await window.storage.set(k,v); } }catch(e){}
  try{ localStorage.setItem(k,v); }catch(e){}
}

const YAKU_NAME=Object.fromEntries(ACHV.map(a=>[a[0],a[1]]));
const ACHV_KEY="yaochu2p_achv";
let unlocked=new Set();
async function loadAchv(){
  try{ const v=await stGet(ACHV_KEY); if(v)unlocked=new Set(JSON.parse(v)); }catch(e){}
}
function saveAchv(){ stSet(ACHV_KEY,JSON.stringify(Array.from(unlocked))); }
function grantAchv(ids){
  const fresh=ids.filter(id=>YAKU_NAME[id]&&!unlocked.has(id));
  if(!fresh.length)return;
  fresh.forEach(id=>unlocked.add(id));
  saveAchv();
  fresh.forEach((id,k)=>setTimeout(()=>toast("実績解除ですわ　"+YAKU_NAME[id]),k*500));
}
const a2=(a,b)=>a-b;
let sleep=ms=>new Promise(r=>setTimeout(r,ms));
function removeN(hand,t,n){
  for(let i=hand.length-1;i>=0&&n>0;i--){ if(hand[i]===t){hand.splice(i,1);n--;} }
}
function tileName(t){ const d=TT[t]; return d.z||(d.n+d.s); }
const G={};
const ROUND_NAMES=["東1局","東2局","南1局","南2局"];
function dealerIdx(){ return G.round%2; }
function roundWind(){ return G.round<2?6:7; }
function seatWind(i){ return i===dealerIdx()?6:7; }
function isMenzen(p){ return p.melds.every(m=>m.type==="ankan"); }
function mkP(){ return {hand:[],melds:[],river:[],riichi:false,riichiPending:false,
  pendingDouble:false,doubleRiichi:false,ippatsu:false,riichiIdx:-1,
  furitenTemp:false,furitenRiichi:false,drawn:null}; }
function newGame(){
  G.scores=[50000,50000]; G.round=0; G.honba=0; G.pot=0; G.over=false;
  startHand();
}
async function startHand(){
  const deck=[]; for(let t=0;t<13;t++)for(let k=0;k<4;k++)deck.push(t);
  for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));
    const tmp=deck[i]; deck[i]=deck[j]; deck[j]=tmp; }
  G.rinshan=deck.slice(0,4);
  G.doraInd=[deck[4]];
  G.uraInd=[deck[5]];
  G.wall=deck.slice(6);
  G.doraRevealed=1; G.kans=0; G.pendingDora=0; G.revealCPU=false;
  G.players=[mkP(),mkP()];
  const d=dealerIdx();
  for(let k=0;k<13;k++){ G.players[d].hand.push(G.wall.pop()); G.players[1-d].hand.push(G.wall.pop()); }
  G.players[0].hand.sort(a2); G.players[1].hand.sort(a2);
  G.cur=d; G.anyCall=false;
  G.discardCounts=[0,0]; G.drawCounts=[0,0]; G.lastDiscarder=d;
  render();
  await sleep(400);
  gameLoop();
}
async function gameLoop(){
  while(true){
    if(G.over)return;
    if(G.wall.length===0){ await ryuukyoku(); return; }
    const i=G.cur, p=G.players[i];
    const tile=G.wall.pop();
    G.drawCounts[i]++;
    p.hand.push(tile); p.drawn=tile;
    const haitei=G.wall.length===0;
    const res=await turnActions(i,{fromRinshan:false,haitei,allowTsumo:true});
    if(res==="win")return;
    G.cur=1-G.lastDiscarder;
  }
}
function tenhouOK(i){ return i===dealerIdx()&&!G.anyCall
  &&G.discardCounts[0]===0&&G.discardCounts[1]===0
  &&G.drawCounts[i]===1&&G.players[i].melds.length===0; }
function chihouOK(i){ return i!==dealerIdx()&&!G.anyCall
  &&G.drawCounts[i]===1&&G.discardCounts[i]===0&&G.players[i].melds.length===0; }
async function turnActions(i,ctx){
  let rinshanFlag=!!ctx.fromRinshan;
  let haiteiFlag=!!ctx.haitei;
  let allowTsumo=ctx.allowTsumo!==false;
  while(true){
    const p=G.players[i];
    const c=countsOf(p.hand), m=p.melds.length;
    const canTsumo=allowTsumo&&winAny(c,m);
    const kanOpts=kanOptions(i);
    const canRiichi=!p.riichi&&!p.riichiPending&&isMenzen(p)
      &&G.wall.length>=1&&riichiDiscards(p).length>0;
    render();
    let act;
    if(i===0){ act=await humanTurn(i,{canTsumo,kanOpts,canRiichi}); }
    else{ await sleep(550); act=cpuTurn(i,{canTsumo,kanOpts,canRiichi}); }
    if(act.type==="tsumo"){
      await settleWin(i,p.drawn,true,{rinshan:rinshanFlag,haitei:haiteiFlag,
        tenhou:tenhouOK(i),chihou:chihouOK(i)});
      return "win";
    }
    if(act.type==="kan"){
      const r=await doKan(i,act.opt);
      if(r==="chankan")return "win";
      rinshanFlag=true; haiteiFlag=false; allowTsumo=true;
      continue;
    }
    const declRiichi=(act.type==="riichi");
    await doDiscard(i,act.tile,declRiichi);
    return await reactions(i,act.tile);
  }
}
function kanOptions(i){
  const p=G.players[i];
  if(G.wall.length<3||G.kans>=4)return [];
  const c=countsOf(p.hand);
  const opts=[];
  if(p.riichi){
    const t=p.drawn;
    if(t!=null&&c[t]===4){
      const c1=c.slice(); c1[t]--;
      const w1=waitsOf(c1,p.melds.length).join(",");
      const c2=c.slice(); c2[t]=0;
      const w2=waitsOf(c2,p.melds.length+1).join(",");
      if(w1.length&&w1===w2)opts.push({kind:"ankan",tile:t});
    }
    return opts;
  }
  for(let t=0;t<13;t++)if(c[t]===4)opts.push({kind:"ankan",tile:t});
  for(const md of p.melds)if(md.type==="pon"&&c[md.tile]>=1)opts.push({kind:"kakan",tile:md.tile});
  return opts;
}
function riichiDiscards(p){
  const res=[]; const m=p.melds.length; const c=countsOf(p.hand);
  const seen=new Set();
  for(const t of p.hand){
    if(seen.has(t))continue; seen.add(t);
    c[t]--; if(waitsOf(c,m).length>0)res.push(t); c[t]++;
  }
  return res;
}
function isFuriten(i){
  const p=G.players[i];
  if(p.furitenTemp||p.furitenRiichi)return true;
  const w=waitsOf(countsOf(p.hand),p.melds.length);
  if(!w.length)return false;
  const rv=p.river.map(e=>e.t);
  return w.some(t=>rv.includes(t));
}
function revealDora(){ if(G.doraRevealed<G.doraInd.length)G.doraRevealed++; }
function clearIppatsu(){ for(const p of G.players)p.ippatsu=false; }
async function doKan(i,opt){
  const p=G.players[i], opp=1-i, po=G.players[opp];
  const co=countsOf(po.hand);
  if(opt.kind==="kakan"&&co[opt.tile]<4){
    co[opt.tile]++;
    const isWin=winAny(co,po.melds.length);
    co[opt.tile]--;
    if(isWin&&!isFuriten(opp)){
      let take;
      if(opp===0){ take=await humanReact({ron:true,ronLabel:"ロン(槍槓)"}); }
      else take="ron";
      if(take==="ron"){
        await settleWin(opp,opt.tile,false,{chankan:true});
        return "chankan";
      }
      po.furitenTemp=true;
      if(po.riichi)po.furitenRiichi=true;
      po.everFuriten=true;
    }
  }
  const t=opt.tile;
  await callout("カン",i);
  G.doraInd.push(G.wall.shift());
  G.uraInd.push(G.wall.shift());
  if(opt.kind==="ankan"){
    removeN(p.hand,t,4);
    p.melds.push({type:"ankan",tile:t});
    revealDora();
  }else{
    removeN(p.hand,t,1);
    const md=p.melds.find(x=>x.type==="pon"&&x.tile===t);
    md.type="kakan";
    revealDora();
  }
  G.kans++; G.anyCall=true; clearIppatsu();
  const rt=G.rinshan.pop();
  p.hand.push(rt); p.drawn=rt;
  render();
  await sleep(350);
  return "ok";
}
async function doDiscard(i,tile,riichiDecl){
  const p=G.players[i];
  let ix=(p.drawn===tile)?p.hand.lastIndexOf(tile):p.hand.indexOf(tile);
  if(ix<0)ix=p.hand.indexOf(tile);
  p.hand.splice(ix,1);
  p.drawn=null;
  p.hand.sort(a2);
  if(riichiDecl){
    p.riichiPending=true;
    p.pendingDouble=(G.discardCounts[i]===0&&!G.anyCall);
    p.riichiIdx=p.river.length;
  }
  p.river.push({t:tile,riichi:!!riichiDecl,called:false});
  {
    const ws=waitsOf(countsOf(p.hand),p.melds.length);
    if(ws.some(t=>p.river.some(e=>!e.called&&e.t===t)))p.everFuriten=true;
  }
  G.discardCounts[i]++;
  G.lastDiscarder=i;
  p.furitenTemp=false;
  if(p.riichi)p.ippatsu=false;
  render();
  if(riichiDecl)await callout("リーチ",i);
  await sleep(220);
}
function establishRiichi(i){
  const p=G.players[i];
  if(!p.riichiPending)return;
  p.riichiPending=false;
  p.riichi=true;
  p.doubleRiichi=p.pendingDouble;
  p.ippatsu=true;
  G.scores[i]-=1000;
  G.pot+=1000;
  render();
}
async function reactions(i,tile){
  const opp=1-i, po=G.players[opp], p=G.players[i];
  const houtei=(G.wall.length===0);
  const co=countsOf(po.hand);
  let canRon=false;
  if(co[tile]<4){
    co[tile]++;
    canRon=winAny(co,po.melds.length);
    co[tile]--;
  }
  if(canRon&&isFuriten(opp))canRon=false;
  const callsOK=(G.wall.length>0)&&!po.riichi;
  const canPon=callsOK&&co[tile]>=2;
  const canKan=callsOK&&co[tile]>=3&&G.kans<4&&G.rinshan.length>0;
  let act="pass";
  if(canRon||canPon||canKan){
    if(opp===0){ act=await humanReact({ron:canRon,pon:canPon,kan:canKan}); }
    else{ act=cpuReact(opp,tile,{ron:canRon,pon:canPon,kan:canKan});
      if(act!=="pass")await sleep(380); }
  }
  if(act==="ron"){
    await settleWin(opp,tile,false,{houtei});
    return "win";
  }
  if(canRon){
    po.furitenTemp=true;
    if(po.riichi)po.furitenRiichi=true;
    po.everFuriten=true;
  }
  establishRiichi(i);
  if(act==="pon"||act==="kan"){
    p.river[p.river.length-1].called=true;
    G.anyCall=true; clearIppatsu();
    G.cur=opp;
    if(act==="pon"){
      await callout("ポン",opp);
      removeN(po.hand,tile,2);
      po.melds.push({type:"pon",tile});
      render(); await sleep(300);
      return await turnActions(opp,{allowTsumo:false});
    }
    await callout("カン",opp);
    removeN(po.hand,tile,3);
    po.melds.push({type:"minkan",tile});
    if(G.wall.length>=2){ G.doraInd.push(G.wall.shift()); G.uraInd.push(G.wall.shift()); }
    revealDora(); G.kans++;
    const rt=G.rinshan.pop();
    po.hand.push(rt); po.drawn=rt;
    render(); await sleep(300);
    return await turnActions(opp,{fromRinshan:true,allowTsumo:true});
  }
  return "pass";
}
async function settleWin(i,winTile,tsumo,flags){
  await callout(tsumo?"ツモ":"ロン",i);
  const p=G.players[i];
  const c=countsOf(p.hand);
  if(!tsumo)c[winTile]++;
  const preC=countsOf(p.hand); if(tsumo)preC[winTile]--;
  const wv=waitsOf(preC,p.melds.length);
  const wasFuriten=!!(p.everFuriten||p.furitenTemp||p.furitenRiichi||wv.some(t=>p.river.some(e=>!e.called&&e.t===t)));
  const doraTiles=G.doraInd.slice(0,G.doraRevealed).map(doraFromIndicator);
  const uraTiles=p.riichi?G.uraInd.slice(0,G.doraRevealed).map(doraFromIndicator):[];
  const res=analyzeWin({
    counts14:c, melds:p.melds, winTile, tsumo,
    riichi:p.riichi&&!p.doubleRiichi, doubleRiichi:p.doubleRiichi,
    ippatsu:p.ippatsu,
    seatWind:seatWind(i), roundWind:roundWind(),
    haitei:!!flags.haitei, houtei:!!flags.houtei,
    rinshan:!!flags.rinshan, chankan:!!flags.chankan,
    tenhou:!!flags.tenhou, chihou:!!flags.chihou,
    doraTiles, uraTiles, furiten:wasFuriten
  });
  if(!res){ return; }
  if(i===1)G.revealCPU=true;
  const isD=(i===dealerIdx());
  const honbaWas=G.honba;
  const ptsBase=winPoints(res.han,res.fu,res.yakumanN,isD);
  const pts=ptsBase+honbaWas*300;
  const potWas=G.pot;
  G.scores[i]+=pts+potWas;
  G.scores[1-i]-=pts;
  G.pot=0;
  if(i===0){
    const ids=res.yakumanN?res.yakuman.map(x=>x[0]):res.yaku.map(x=>x[0]);
    grantAchv(ids);
  }
  render();
  const endNow=(G.round===3)&&(!isD||G.scores[i]>G.scores[1-i]);
  await showResult(i,winTile,tsumo,res,ptsBase,honbaWas,potWas,endNow);
  if(G.over)return;
  if(endNow){ await gameEnd(); return; }
  if(isD){ G.honba++; }
  else{ G.round++; G.honba=0; }
  if(G.round>3){ await gameEnd(); return; }
  startHand();
}
async function ryuukyoku(){
  const ten=[0,1].map(i=>waitsOf(countsOf(G.players[i].hand),G.players[i].melds.length).length>0);
  if(ten[1])G.revealCPU=true;
  let h="<h2>流局ですわ…</h2>";
  for(const i of [1,0]){
    h+='<div class="yline"><span>'+(i===0?"お嬢様":"CPU")+"</span><span>"
      +(ten[i]?"聴牌ですわ":"ノーテンですの…")+"</span></div>";
    if(ten[i]){
      const p=G.players[i];
      const sz="xs";
      let row=p.hand.slice().sort(a2).map(t=>tileHTML(t,sz)).join("");
      for(const md of p.melds)row+='<span style="width:8px;display:inline-block"></span>'+meldHTML(md,sz);
      h+='<div class="handrow">'+row+"</div>";
    }
  }
  if(ten[0]!==ten[1]){
    const w=ten[0]?0:1;
    G.scores[w]+=1000; G.scores[1-w]-=1000;
    h+='<div class="yline"><span>ノーテン罰符</span><span>1000点</span></div>';
  }
  render();
  if(G.pot>0)h+='<div class="yline"><span>供託</span><span>'+G.pot+'点 持ち越しですわ</span></div>';
  await showOverlay(h,[{label:"次局へ参りますわ",val:1}]);
  G.honba++;
  if(!ten[dealerIdx()])G.round++;
  if(G.round>3){ await gameEnd(); return; }
  startHand();
}
async function gameEnd(){
  G.over=true;
  if(G.pot>0){
    if(G.scores[0]>G.scores[1])G.scores[0]+=G.pot;
    else if(G.scores[1]>G.scores[0])G.scores[1]+=G.pot;
    else{ G.scores[0]+=G.pot/2; G.scores[1]+=G.pot/2; }
    G.pot=0;
  }
  const a=G.scores[0], b=G.scores[1];
  const ttl=a>b?"お嬢様の勝利ですわ！":(a<b?"CPUの勝利ですわ…":"引き分けですわ");
  let h='<h2>終局ですわ</h2><div class="total">'+ttl+"</div>";
  h+='<div class="yline"><span>お嬢様</span><span>'+a+"点</span></div>";
  h+='<div class="yline"><span>CPU</span><span>'+b+"点</span></div>";
  render();
  await showOverlay(h,[{label:"もう一局ですわ",val:1}]);
  newGame();
}
function visibleRemain(t,i){
  let seen=countsOf(G.players[i].hand)[t];
  for(const pl of G.players){
    for(const e of pl.river)if(!e.called&&e.t===t)seen++;
    for(const md of pl.melds)if(md.tile===t)seen+=(md.type==="pon"?3:4);
  }
  for(let k=0;k<G.doraRevealed;k++)if(G.doraInd[k]===t)seen++;
  return Math.max(0,4-seen);
}
function cpuBestDiscard(i){
  const p=G.players[i], m=p.melds.length;
  const opp=G.players[1-i];
  const c=countsOf(p.hand);
  const list=[];
  for(const t of new Set(p.hand)){
    c[t]--;
    const sh=shanten(c,m);
    let uke=0;
    for(let u=0;u<13;u++){
      if(c[u]>=4)continue;
      c[u]++;
      if(shanten(c,m)<sh)uke+=visibleRemain(u,i);
      c[u]--;
    }
    c[t]++;
    list.push({t,sh,uke,gen:opp.river.some(e=>e.t===t)?1:0});
  }
  let shNow=99; for(const x of list)if(x.sh<shNow)shNow=x.sh;
  const fold=opp.riichi&&shNow>=2;
  list.sort((A,B)=>{
    if(fold&&A.gen!==B.gen)return B.gen-A.gen;
    if(A.sh!==B.sh)return A.sh-B.sh;
    if(opp.riichi&&A.gen!==B.gen)return B.gen-A.gen;
    return B.uke-A.uke;
  });
  return list[0].t;
}
function cpuTurn(i,o){
  const p=G.players[i];
  if(o.canTsumo)return {type:"tsumo"};
  if(p.riichi){
    if(o.kanOpts.length)return {type:"kan",opt:o.kanOpts[0]};
    return {type:"discard",tile:p.drawn};
  }
  const opp=G.players[1-i];
  if(!opp.riichi){
    for(const opt of o.kanOpts){
      const c=countsOf(p.hand), m=p.melds.length;
      let shNow=99;
      for(const t of new Set(p.hand)){ c[t]--; const s=shanten(c,m); if(s<shNow)shNow=s; c[t]++; }
      const c2=countsOf(p.hand); let m2=m;
      if(opt.kind==="ankan"){ c2[opt.tile]=0; m2=m+1; } else { c2[opt.tile]--; }
      if(shanten(c2,m2)<=shNow)return {type:"kan",opt};
    }
  }
  if(o.canRiichi){
    const c=countsOf(p.hand), m=p.melds.length;
    const river=p.river.map(e=>e.t);
    let bestT=-1, bestW=-1;
    for(const t of riichiDiscards(p)){
      c[t]--;
      const w=waitsOf(c,m);
      const fur=w.some(x=>river.includes(x));
      let wr=0; for(const x of w)wr+=visibleRemain(x,i);
      c[t]++;
      if(!fur&&wr>0&&wr>bestW){ bestW=wr; bestT=t; }
    }
    if(bestT>=0)return {type:"riichi",tile:bestT};
  }
  return {type:"discard",tile:cpuBestDiscard(i)};
}
function cpuReact(i,tile,can){
  if(can.ron)return "ron";
  const p=G.players[i], opp=G.players[1-i];
  const c=countsOf(p.hand), m=p.melds.length;
  const shNow=shanten(c,m);
  if(opp.riichi&&shNow>=2)return "pass";
  if(can.kan){
    const c2=c.slice(); c2[tile]-=3;
    if(shanten(c2,m+1)<shNow&&shNow<=2)return "kan";
  }
  if(can.pon){
    const c2=c.slice(); c2[tile]-=2;
    let best=99;
    for(let t=0;t<13;t++){
      if(c2[t]<=0)continue;
      c2[t]--; const s=shanten(c2,m+1); if(s<best)best=s; c2[t]++;
    }
    if(best<shNow)return "pon";
  }
  return "pass";
}
let inputState=null;
function awaitInput(o){
  return new Promise(res=>{
    inputState={tiles:o.tiles||null,buttons:o.buttons||[],hint:o.hint||"",resolve:res};
    render();
  });
}
function tileTap(t){
  if(!inputState||!inputState.tiles)return;
  if(inputState.tiles!=="all"&&!inputState.tiles.has(t))return;
  const r=inputState; inputState=null;
  r.resolve({type:"tile",tile:t});
}
async function humanTurn(i,o){
  const p=G.players[i];
  if(p.riichi){
    if(o.canTsumo){
      const v=await awaitInput({buttons:[{label:"ツモ",val:{type:"tsumo"}}]});
      return v;
    }
    if(o.kanOpts.length){
      const v=await awaitInput({buttons:[
        {label:"カン",val:{type:"kan",opt:o.kanOpts[0]}},
        {label:"ツモ切り",val:{type:"discard",tile:p.drawn},cls:"sub"}]});
      return v;
    }
    render();
    await sleep(500);
    return {type:"discard",tile:p.drawn};
  }
  while(true){
    const buttons=[];
    if(o.canTsumo)buttons.push({label:"ツモ",val:{type:"tsumo"}});
    if(o.canRiichi)buttons.push({label:"リーチ",val:{type:"riichiMode"}});
    if(o.kanOpts.length)buttons.push({label:"カン",val:{type:"kanMode"}});
    const v=await awaitInput({tiles:"all",buttons});
    if(v.type==="tile")return {type:"discard",tile:v.tile};
    if(v.type==="tsumo")return v;
    if(v.type==="riichiMode"){
      const ok=new Set(riichiDiscards(p));
      const v2=await awaitInput({tiles:ok,hint:"リーチ　お捨てになる牌をどうぞ",
        buttons:[{label:"やめますわ",val:{type:"cancel"},cls:"sub"}]});
      if(v2.type==="tile")return {type:"riichi",tile:v2.tile};
      continue;
    }
    if(v.type==="kanMode"){
      if(o.kanOpts.length===1)return {type:"kan",opt:o.kanOpts[0]};
      const btns=o.kanOpts.map(op=>({
        label:(op.kind==="ankan"?"暗槓 ":"加槓 ")+tileName(op.tile),
        val:{type:"kan",opt:op}}));
      btns.push({label:"やめますわ",val:{type:"cancel"},cls:"sub"});
      const v2=await awaitInput({buttons:btns});
      if(v2.type&&v2.type==="kan")return v2;
      continue;
    }
  }
}
async function humanReact(can){
  const buttons=[];
  if(can.ron)buttons.push({label:can.ronLabel||"ロン",val:"ron"});
  if(can.pon)buttons.push({label:"ポン",val:"pon"});
  if(can.kan)buttons.push({label:"カン",val:"kan"});
  buttons.push({label:"スルー",val:"pass",cls:"sub"});
  return await awaitInput({buttons});
}

function tileHTML(t,extra){
  const cls="tile "+(extra||"")+" "+TT[t].c;
  return '<span class="'+cls+'"><img class="face" src="'+TILE_IMG[t]
    +'" alt="'+tileName(t)+'" draggable="false"></span>';
}
function backHTML(size){ return '<span class="tile back '+(size||"")+'"></span>'; }
function meldHTML(md,size){
  let h='<span class="meld">';
  const up=()=>tileHTML(md.tile,size);
  const side=()=>tileHTML(md.tile,size+" side");
  if(md.type==="ankan"){
    h+=backHTML(size)+up()+up()+backHTML(size);
  }else if(md.type==="pon"){
    h+=up()+side()+up();
  }else if(md.type==="minkan"){
    h+=up()+side()+up()+up();
  }else{
    h+=up()+'<span class="kstack">'+side()+side()+"</span>"+up()+up();
  }
  return h+"</span>";
}
function selfFuriten(i){
  const p=G.players[i];
  if((p.hand.length%3)!==1)return false;
  const w=waitsOf(countsOf(p.hand),p.melds.length);
  if(!w.length)return false;
  const rv=p.river.map(e=>e.t);
  return w.some(t=>rv.includes(t));
}
function barHTML(i){
  const p=G.players[i];
  const nm=(i===0)?"お嬢様":"CPU";
  const w=(seatWind(i)===6)?"東":"南";
  const dealer=(i===dealerIdx());
  const turn=(G.cur===i&&!G.over);
  let flags="";
  if(p.riichi||p.riichiPending)flags+='<span class="badge">リーチ</span><span class="stick"></span>';
  if(i===0&&(p.furitenTemp||p.furitenRiichi||selfFuriten(0)))flags+='<span class="badge ft">フリテン</span>';
  const sc=G.scores[i];
  return '<span class="turnDot'+(turn?"":" off")+'"></span>'
    +'<span class="wind'+(dealer?" dealer":"")+'">'+w+"</span>"
    +'<span class="nm">'+nm+"</span>"+flags
    +'<span class="sc'+(sc<0?" minus":"")+'">'+sc+"</span>";
}
function riverHTML(i){
  return G.players[i].river.map((e,ix,arr)=>{
    let cls="xs";
    if(e.riichi)cls+=" side";
    if(e.called)cls+=" called";
    const h=tileHTML(e.t,cls);
    return (i===1)?h.replace('<span class="','<span style="z-index:'+(arr.length-ix)+'" class="'):h;
  }).join("");
}
function tileBtn(t,ok,selMode){
  const dim=(selMode&&!ok)?" dim":"";
  const on=ok?' onclick="tileTap('+t+')"':"";
  return '<button class="tileBtn"'+on+">"+tileHTML(t,"sm"+dim)+"</button>";
}
function renderHand(){
  const p=G.players[0];
  const el=document.getElementById("pHand");
  let disp=p.hand.slice(), drawn=null;
  if(p.drawn!=null){
    const ix=disp.lastIndexOf(p.drawn);
    if(ix>=0){ disp.splice(ix,1); drawn=p.drawn; }
  }
  disp.sort(a2);
  const selMode=!!(inputState&&inputState.tiles);
  const okT=t=>selMode&&(inputState.tiles==="all"||inputState.tiles.has(t));
  let h=disp.map(t=>tileBtn(t,okT(t),selMode)).join("");
  if(drawn!=null)h+='<span class="drawnGap"></span>'+tileBtn(drawn,okT(drawn),selMode);
  el.innerHTML=h;
}
function renderActionBar(){
  const el=document.getElementById("actions");
  el.innerHTML="";
  if(!inputState)return;
  if(inputState.hint){
    const s=document.createElement("span");
    s.className="hint"; s.textContent=inputState.hint;
    el.appendChild(s);
  }
  for(const b of inputState.buttons){
    const btn=document.createElement("button");
    btn.className="btn"+(b.cls?" "+b.cls:"");
    btn.textContent=b.label;
    btn.onclick=()=>{ const r=inputState; inputState=null; r.resolve(b.val); };
    el.appendChild(btn);
  }
}
function assertConservation(){
  try{
    let n=G.wall.length+G.rinshan.length+G.doraInd.length+G.uraInd.length;
    for(const p of G.players){
      n+=p.hand.length;
      for(const md of p.melds)n+=(md.type==="pon")?3:4;
      for(const e of p.river)if(!e.called)n++;
    }
    if(n!==52)console.error("牌保存則違反",n);
  }catch(e){}
}
let introActive=false;
function render(){
  if(!G.players)return;
  if(typeof document==="undefined")return;
  document.getElementById("cpuBar").innerHTML=barHTML(1);
  document.getElementById("pBar").innerHTML=barHTML(0);
  document.getElementById("cpuRiver").innerHTML=riverHTML(1);
  if(G.discardCounts&&(G.discardCounts[0]+G.discardCounts[1])>0)introActive=false;
  const showIntro=introActive&&G.discardCounts&&G.discardCounts[0]===0&&G.discardCounts[1]===0;
  document.getElementById("pRiver").innerHTML=(showIntro?'<div id="introHint">ごきげんよう｡1･9･字牌の么九牌だけで戦う二人麻雀ですわ｡<br>中張牌は使いませんの｡不要牌を切り､相手の捨て牌か自摸で和了なさってくださいまし｡<br>么九牌のみゆえ役は大きく育ちますのよ｡</div>':"")+riverHTML(0);
  const _app=document.getElementById("app");
  if(_app)_app.classList.toggle("intro",showIntro);
  const cpu=G.players[1], me=G.players[0];
  const cpuHand=G.revealCPU
    ?cpu.hand.slice().sort(a2).map(t=>tileHTML(t,"xs flip")).join("")
    :new Array(cpu.hand.length).fill(backHTML("xs")).join("");
  document.getElementById("cpuMelds").innerHTML=
    '<span class="meld">'+cpuHand+"</span>"+cpu.melds.map(m=>meldHTML(m,"xs flip")).join("");
  document.getElementById("pMelds").innerHTML=me.melds.map(m=>meldHTML(m,"xxs")).join("");
  document.getElementById("roundName").textContent=ROUND_NAMES[Math.min(G.round,3)];
  document.getElementById("honbaPot").textContent=G.honba+"本場　供託"+(G.pot/1000)+"本";
  document.getElementById("wallCnt").textContent="お山"+G.wall.length;
  let dr="";
  for(let k=0;k<5;k++)dr+=(k<G.doraRevealed)?tileHTML(G.doraInd[k],"xs"):backHTML("xs");
  document.getElementById("doraRow").innerHTML=dr;
  renderHand();
  renderActionBar();
  assertConservation();
}
function overlayOpen(html,fixed,cls){
  const ov=document.getElementById("overlay"), box=document.getElementById("ovBox");
  if(box.classList){box.classList.toggle("fixed",!!fixed);box.classList.toggle("confirm",cls==="confirm");}
  box.innerHTML=html;
  ov.hidden=false;
  box.scrollTop=0;
  return box;
}
function overlayButtons(box,buttons,dismissible,dismissVal){
  return new Promise(res=>{
    const ov=document.getElementById("overlay");
    let done=false, onBackdrop=null;
    const finish=(v)=>{ if(done)return; done=true; ov.hidden=true; if(onBackdrop)ov.removeEventListener("click",onBackdrop); res(v); };
    if(dismissible){
      const dv=(dismissVal===undefined?0:dismissVal);
      const wrap=document.createElement("div"); wrap.className="ovCloseWrap";
      const x=document.createElement("button"); x.type="button"; x.className="ovClose";
      x.setAttribute("aria-label","閉じる"); x.textContent="✕";
      x.onclick=()=>finish(dv);
      wrap.appendChild(x); box.insertBefore(wrap,box.firstChild);
      onBackdrop=(e)=>{ if(e.target===ov)finish(dv); };
      ov.addEventListener("click",onBackdrop);
    }
    const bt=document.createElement("div"); bt.className="obtns";
    for(const b of buttons){
      const el=document.createElement("button");
      el.className="btn"+(b.cls?" "+b.cls:"");
      el.textContent=b.label;
      el.onclick=()=>finish(b.val);
      bt.appendChild(el);
    }
    box.appendChild(bt);
  });
}
function showOverlay(html,buttons,cls,dismissible){
  return overlayButtons(overlayOpen(html,false,cls),buttons,dismissible);
}
function callout(text,who){
  if(typeof document==="undefined"||!document.body)return Promise.resolve();
  return new Promise(res=>{
    const d=document.createElement("div");
    d.className="callout "+(who===1?"top":"bottom");
    d.innerHTML="<span>"+text+"</span>";
    document.body.appendChild(d);
    setTimeout(()=>{ d.remove(); res(); },950);
  });
}
const DISP_ORDER=["tenhou","chihou","daisangen","suuankou_tanki","suuankou","tsuuiisou",
 "chinroutou","kokushi13","kokushi","shousuushi","daisuushi","suukantsu",
 "dbriichi","riichi","ippatsu","tsumo","haku","hatsu","chun","jikaze","bakaze",
 "haitei","houtei","rinshan","chankan",
 "chiitoi","toitoi","sanankou","sankantsu","sanshokudoukou","honroutou","shousangen","honitsu"];
function dispIdx(id){ const k=DISP_ORDER.indexOf(id); return k<0?99:k; }
async function showResult(i,winTile,tsumo,res,pts,honbaWas,potWas,endNow){
  const p=G.players[i];
  const who=(i===0)?"お嬢様":"CPU";
  let head="<h2>"+who+"の"+(tsumo?"ツモ":"ロン")+"和了ですわ</h2>";
  let tiles=p.hand.slice();
  if(tsumo){ const ix=tiles.lastIndexOf(winTile); if(ix>=0)tiles.splice(ix,1); }
  tiles.sort(a2);
  let hrow=tiles.map(t=>tileHTML(t,"xs")).join("")
    +'<span style="width:6px;display:inline-block"></span>'
    +tileHTML(winTile,"xs win");
  for(const md of p.melds)hrow+='<span style="width:8px;display:inline-block"></span>'+meldHTML(md,"xs");
  head+='<div class="handrow">'+hrow+"</div>"+'<div class="ylist"><div class="ycol"></div><div class="ycol"></div></div>'+'<div class="rfoot"><div class="rslot rtotal"></div><div class="rslot rscore"></div><div class="rslot rbtn"></div></div>';
  const box=overlayOpen(head,true);
  const list=(box.querySelector&&box.querySelector(".ylist"))||box;
  const foot=(box.querySelector&&box.querySelector(".rfoot"))||box;
  const slot=n=>(box.querySelector&&box.querySelector("."+n))||foot;
  let fast=false;
  box.onclick=()=>{ fast=true; };
  const beat=ms=>sleep(fast?40:ms);
  const add=async(html,ms,toBox)=>{
    const tpl=document.createElement("div");
    tpl.innerHTML=html;
    const el=tpl.firstElementChild||tpl;
    if(toBox){ slot(toBox===true?"rfoot":toBox).appendChild(el); }
    else{
      const c0=list.children[0], c1=list.children[1];
      (c0||list).appendChild(el);
      if(c0&&c1&&list.clientHeight&&list.scrollHeight>list.clientHeight)c1.appendChild(el);
      if(list.scrollHeight>list.clientHeight)list.scrollTop=list.scrollHeight;
    }
    await beat(ms);
  };
  const yline=(a,b)=>'<div class="yline"><span>'+a+"</span><span>"+b+"</span></div>";
  await beat(500);
  if(res.yakumanN){
    const ord=res.yakuman.slice().sort((x,y)=>dispIdx(x[0])-dispIdx(y[0]));
    for(const ym of ord)await add(yline(YAKU_NAME[ym[0]],"役満"),750);
  }else{
    const ord=res.yaku.slice().sort((x,y)=>dispIdx(x[0])-dispIdx(y[0]));
    for(const y of ord)await add(yline(YAKU_NAME[y[0]],y[1]+"翻"),380);
    if(res.doraHan)await add(yline("ドラ",res.doraHan+"翻"),380);
    if(p.riichi)await add(yline("裏ドラ",res.uraHan?res.uraHan+"翻":"なし"),380);
  }
  await beat(450);
  const lim=limitName(res.han,res.fu,res.yakumanN);
  const sub=res.yakumanN?lim:(res.fu+"符"+res.han+"翻"+(lim?"　"+lim:""));
  const tier=res.yakumanN>=2?6:res.yakumanN?5:res.han>=13?5:res.han>=11?4:res.han>=8?3:res.han>=6?2:(res.han>=5||basePoints(res.han,res.fu,0)>=2000)?1:0;
  await add('<div class="total'+(tier?" t"+tier:"")+'"><span class="sub">'+sub+"</span>"
    +'<span class="pts">'+pts+'点</span>'
    +"</div>",300,"rtotal");
  await add(yline("お嬢様",G.scores[0]+"点"),80,"rscore");
  await add(yline("CPU",G.scores[1]+"点"),80,"rscore");
  box.onclick=null;
  await overlayButtons(slot("rbtn"),[{label:endNow?"終局へ参りますわ":"次局へ参りますわ",val:1}]);
}
function toast(msg){
  if(typeof document==="undefined")return;
  const el=document.createElement("div");
  el.className="toast"; el.textContent=msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>{ el.style.transition="opacity .4s"; el.style.opacity="0";
    setTimeout(()=>el.remove(),450); },2600);
}
async function showAchievements(){
  const items=ACHV.map(a=>{
    const on=unlocked.has(a[0]);
    return '<div class="ach'+(on?" on":"")+'"><span class="mk">'+(on?"✓":"")+"</span>"
      +'<span class="an">'+a[1]+'</span><span class="ad">'+a[2]+"</span></div>";
  }).join("");
  const h="<h2>実績　"+unlocked.size+" / "+ACHV.length+'</h2><div class="achGrid">'+items+"</div>";
  const v=await showOverlay(h,[{label:"閉じますわ",val:0,cls:"sub"},{label:"リセット",val:9,cls:"sub"}],undefined,true);
  if(v===9){
    const v2=await showOverlay('<h2>実績リセットですの？</h2><div style="font-size:14px">全ての実績を消去いたしますわ｡取り消しはできませんのよ｡</div>',
      [{label:"消去しますわ",val:1},{label:"やめておきますわ",val:0,cls:"sub"}]);
    if(v2===1){ unlocked=new Set(); saveAchv(); toast("実績を消去いたしましたわ"); }
  }
}

}
