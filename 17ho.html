<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>17歩　二人麻雀</title>
<style>
:root{
  --felt:#173f31; --felt2:#0f2d22; --line:#2b5a47;
  --ivory:#f7f3e6; --ivory2:#e9e2cd; --ink:#1c1a16;
  --man:#b03030; --pin:#1d55a8; --sou:#1e7a3c;
  --gold:#d8b25a; --accent:#e8c977; --warn:#e07a5f;
  --htw:min(34px,calc((min(100vw,520px) - 52px)/14));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--felt2);color:var(--ivory);
  font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
  -webkit-user-select:none;user-select:none;touch-action:manipulation}
#app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
  background:
   radial-gradient(120% 60% at 50% 0%,rgba(255,255,255,.05),transparent 60%),
   var(--felt);
  padding:6px 8px calc(10px + env(safe-area-inset-bottom))}
.pbar{display:flex;align-items:center;gap:8px;padding:4px 6px;font-size:13px}
.pbar .nm{font-weight:700}
.pbar .wind{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;
  border-radius:4px;background:var(--felt2);border:1px solid var(--line);font-size:12px}
.pbar .wind.dealer{background:var(--warn);color:#fff;border-color:transparent}
.pbar .sc{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:700;font-size:15px}
.pbar .sc.minus{color:var(--warn)}
.badge{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--gold);color:#3a2c0a;font-weight:700}
.badge.ft{background:var(--warn);color:#fff}
.river{display:flex;flex-wrap:wrap;gap:0;justify-content:flex-start;align-items:flex-end;
  align-content:flex-start;height:103px;padding:2px 0;width:156px;margin:0 auto}
.melds{display:flex;gap:8px;justify-content:flex-end;min-height:0;padding:0 4px;flex-wrap:wrap}
.meld{display:flex;gap:1px;align-items:flex-end}
.tile{width:34px;height:46px;border-radius:5px;background:linear-gradient(180deg,#fffdf4,var(--ivory) 55%,var(--ivory2));
  border:1px solid #b9ae8e;box-shadow:0 2px 0 #a99e7f,0 3px 4px rgba(0,0,0,.35);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--ink);line-height:1;position:relative;flex:none}
.tile .face{width:92%;height:92%;object-fit:contain;pointer-events:none;-webkit-user-drag:none;user-select:none;display:block}
a.iconbtn{text-decoration:none;display:inline-flex;align-items:center}
.tile .n{font-size:17px;font-weight:800}
.tile .s{font-size:11px;font-weight:700;margin-top:1px}
.tile .z{font-size:19px;font-weight:800}
.tile.m .n,.tile.m .s{color:var(--man)}
.tile.p .n,.tile.p .s{color:var(--pin)}
.tile.s .n,.tile.s .s{color:var(--sou)}
.tile.zw .z{color:#2a2a2a}
.tile.zd-h .z{color:#9a9a8c}
.tile.zd-g .z{color:var(--sou)}
.tile.zd-r .z{color:var(--man)}
.tile.sm{width:30px;height:41px}
.tile.sm .n{font-size:15px}.tile.sm .z{font-size:16px}.tile.sm .s{font-size:10px}
.tile.xs{width:24px;height:33px;border-radius:4px}
.tile.xs .n{font-size:12px}.tile.xs .z{font-size:13px}.tile.xs .s{font-size:8px}
.tile.back{background:linear-gradient(180deg,#3f6f58,#2c523f);border-color:#1e3a2d;
  box-shadow:0 2px 0 #16281f,0 3px 4px rgba(0,0,0,.35)}
.tile.side{width:46px;height:34px}
.tile.sm.side{width:41px;height:30px}
.tile.xs.side{width:33px;height:24px}
.tile.side .face{transform:rotate(90deg);width:31px;height:42px}
.tile.sm.side .face{width:28px;height:38px}
.tile.xs.side .face{width:22px;height:30px}
.tile.flip .face{transform:rotate(180deg)}
.tile.side.flip .face{transform:rotate(270deg)}
.river .tile.xs.side{margin-top:9px}
#cpuRiver{transform:rotate(180deg)}
#cpuRiver .tile{background:linear-gradient(0deg,#fffdf4,var(--ivory) 55%,var(--ivory2));box-shadow:0 -2px 0 #a99e7f,0 -3px 4px rgba(0,0,0,.35)}
.kstack{display:flex;flex-direction:column;gap:1px;justify-content:flex-end}
.tile.called{opacity:.35}
.tile.win{outline:3px solid var(--accent);outline-offset:-1px}
button.tileBtn{padding:0;margin:0;border:none;background:none;font:inherit}
#pHand{display:flex;gap:0;justify-content:flex-start;align-items:flex-end;flex-wrap:nowrap;
  padding:8px 2px 4px;min-height:64px}
#pHand .tile{width:var(--htw);height:calc(var(--htw)*1.36)}
#pHand .drawnGap{margin-left:3px;flex:none}
#pHand .tile.sel{transform:translateY(-8px)}
#pHand .tile.dim{opacity:.35}
#center{width:300px;max-width:100%;margin:2px auto;padding:8px 12px;border:1px solid var(--line);border-radius:10px;
  background:rgba(0,0,0,.22);display:flex;flex-direction:column;gap:6px}
#center .row1{display:flex;align-items:center;gap:14px;font-size:13px;justify-content:center;white-space:nowrap}
#center .rname{font-size:16px;font-weight:800;letter-spacing:.05em;white-space:nowrap}
#center .kv{opacity:.9;font-variant-numeric:tabular-nums;white-space:nowrap}
#center .spacer{margin-left:auto;display:flex;gap:6px}
#center .row2{display:flex;align-items:center;gap:8px;justify-content:center}
#doraRow{display:flex;gap:0}
#doraRow .tile{width:24px;height:33px;flex:none}
#center .lbl{font-size:10px;opacity:.75;letter-spacing:.1em}
header{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 8px}
#hdrBtns{display:flex;gap:6px}
#hdrBtns button{background:none;border:1px solid rgba(236,223,180,.4);color:var(--ivory);border-radius:999px;font-size:11px;padding:5px 12px;letter-spacing:.05em;cursor:pointer}
h1{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;font-size:17px;font-weight:600;letter-spacing:.18em;color:var(--ivory);margin:0}
#home{background:none;border:1px solid rgba(236,223,180,.4);color:var(--ivory);border-radius:999px;font-size:11px;padding:5px 12px;letter-spacing:.05em;cursor:pointer}
.iconbtn{font-size:11px;padding:5px 9px;border-radius:6px;border:1px solid var(--line);
  background:var(--felt2);color:var(--ivory);font-weight:700}
#actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;min-height:52px;
  align-items:center;padding:6px 0 2px}
#actions .btn{font-size:16px;font-weight:800;padding:11px 18px;border-radius:9px;border:none;
  color:#241c08;background:linear-gradient(180deg,#f0d78c,var(--gold));
  box-shadow:0 3px 0 #a8862f,0 4px 8px rgba(0,0,0,.4)}
#actions .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #a8862f}
#actions .btn.sub{background:linear-gradient(180deg,#4c7a63,#38604c);color:var(--ivory);box-shadow:0 3px 0 #24402f}
#actions .hint{font-size:12px;opacity:.85}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;
  justify-content:center;z-index:40;padding:14px}
#overlay[hidden]{display:none}
#ovBox{background:#20463a;border:1px solid var(--line);border-radius:14px;max-width:480px;width:100%;
  max-height:86dvh;overflow-y:auto;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
#ovBox h2{margin:0 0 8px;font-size:18px;letter-spacing:.06em}
.ovCloseWrap{position:sticky;top:0;height:0;z-index:5;display:flex;justify-content:flex-end;pointer-events:none}
.ovClose{pointer-events:auto;width:30px;height:30px;margin:-4px -4px 0 0;border-radius:50%;border:1px solid rgba(236,223,180,.35);background:rgba(20,40,32,.92);color:var(--ivory);font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.ovClose:active{transform:scale(.92)}
#ovBox.fixed{height:min(540px,86dvh);display:flex;flex-direction:column;overflow:hidden}
#ovBox.fixed .ylist{flex:1 1 auto;min-height:0;overflow-y:auto;margin-top:4px}
#ovBox.fixed .rfoot{flex:none;display:flex;flex-direction:column;margin-top:6px}
#ovBox .rfoot .rtotal{height:96px;display:flex;flex-direction:column;justify-content:center}
#ovBox .rfoot .rtotal .total{margin:0}
#ovBox .rfoot .rscore{height:52px}
#ovBox .rfoot .rbtn{height:62px;display:flex;align-items:flex-end;justify-content:center}
#ovBox .ylist{display:flex;gap:14px;align-items:flex-start}
#ovBox .ylist .ycol{flex:1 1 0;min-width:0}
#ovBox .yline{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;
  border-bottom:1px dashed rgba(255,255,255,.12)}
#ovBox .total{font-size:20px;font-weight:800;text-align:center;margin:12px 0 4px;color:var(--accent)}
#ovBox .handrow{display:flex;gap:0;flex-wrap:wrap;margin:8px 0;align-items:center}
#ovBox .obtns{display:flex;gap:10px;justify-content:center;margin-top:14px}
#ovBox .obtns .btn{font-size:15px;font-weight:800;padding:10px 20px;border-radius:9px;border:none;
  color:#241c08;background:linear-gradient(180deg,#f0d78c,var(--gold))}
#ovBox .obtns .btn.sub{background:#38604c;color:var(--ivory)}
#ovBox.confirm{background:linear-gradient(180deg,#16493b,#0c352b);border:1px solid rgba(217,185,108,.5);border-radius:18px;max-width:400px;padding:26px 20px 20px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.55)}
#ovBox.confirm h2{font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif;letter-spacing:.18em;text-indent:.18em;color:#ecdfb4;font-size:21px;font-weight:600;margin:0}
#ovBox.confirm .csub{color:rgba(239,233,214,.65);font-size:11.5px;margin-top:10px;letter-spacing:.08em;line-height:1.7}
#ovBox.confirm .obtns{flex-direction:column;gap:8px;margin-top:18px}
#ovBox.confirm .obtns .btn{width:100%;margin:0;padding:13px;border-radius:12px;border:0;background:#d9b96c;color:#2c2410;font-weight:800;font-size:15px;letter-spacing:.25em;text-indent:.25em;box-shadow:none}
#ovBox.confirm .obtns .btn.sub{padding:9px;border:1px solid rgba(236,223,180,.35);background:none;color:#cfc6a6;font-size:12px;font-weight:400;letter-spacing:.1em}
.achGrid{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.ach{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:8px;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.07);font-size:13px}
.ach .mk{width:22px;height:22px;border-radius:50%;flex:none;display:flex;align-items:center;
  justify-content:center;font-size:13px;background:#173226;color:#5d806f}
.ach.on{border-color:var(--gold);background:rgba(216,178,90,.12)}
.ach.on .mk{background:var(--gold);color:#3a2c0a}
.ach .an{font-weight:700}
.ach .ad{opacity:.7;font-size:11px;margin-left:auto;text-align:right}
#toasts{position:fixed;left:0;right:0;top:10px;display:flex;flex-direction:column;gap:6px;
  align-items:center;z-index:60;pointer-events:none}
.toast{background:linear-gradient(180deg,#f0d78c,var(--gold));color:#3a2c0a;font-weight:800;
  padding:9px 16px;border-radius:24px;font-size:14px;box-shadow:0 6px 18px rgba(0,0,0,.5);
  animation:tin .25s ease-out}
@keyframes tin{from{transform:translateY(-14px);opacity:0}to{transform:none;opacity:1}}
.callout{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:55;pointer-events:none}
.callout.top{align-items:flex-start;padding-top:14dvh}
.callout.bottom{align-items:flex-end;padding-bottom:28dvh}
.callout span{font-size:60px;font-weight:900;color:var(--accent);
  -webkit-text-stroke:2px #2a1f06;letter-spacing:.12em;
  text-shadow:0 6px 30px rgba(0,0,0,.7);
  animation:coPop .95s cubic-bezier(.2,1.5,.4,1) both}
@keyframes coPop{0%{transform:scale(.25);opacity:0}22%{transform:scale(1.18);opacity:1}
  38%{transform:scale(1)}78%{opacity:1}100%{opacity:0}}
#ovBox .yline{animation:lineIn .25s ease-out both}
@keyframes lineIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
#ovBox .total .sub{display:block;font-size:13px;font-weight:700;color:#8fae9c;margin-bottom:2px}
#ovBox .total .pts{font-size:32px;font-weight:900;color:var(--accent);display:inline-block}
#ovBox .total.t1 .pts{animation:ptsIn .55s cubic-bezier(.2,1.6,.4,1)}
#ovBox .total.t2 .pts{font-size:34px;animation:ptsIn .55s cubic-bezier(.2,1.6,.4,1),ptsGlow 1.6s ease-in-out .6s infinite}
#ovBox .total.t3 .pts{font-size:36px;animation:ptsIn .6s cubic-bezier(.2,1.7,.4,1),ptsGlow 1.1s ease-in-out .6s infinite}
#ovBox .total.t4 .pts{font-size:38px;animation:ptsIn .65s cubic-bezier(.2,1.8,.4,1),ptsGlow .85s ease-in-out .7s infinite,ptsShake 2.4s ease-in-out .9s infinite}
#ovBox .total.t5 .pts{font-size:41px;text-shadow:0 0 14px rgba(255,205,90,.9);animation:ptsIn .7s cubic-bezier(.2,1.9,.4,1),ptsHue 1.8s linear .8s infinite}
#ovBox .total.t6 .pts{font-size:44px;text-shadow:0 0 18px rgba(255,140,140,.95);animation:ptsIn .7s cubic-bezier(.2,2,.4,1),ptsHue .9s linear .8s infinite}
@keyframes ptsIn{0%{transform:scale(.3);opacity:0}55%{transform:scale(1.35)}80%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes ptsGlow{0%,100%{text-shadow:0 0 4px rgba(255,205,90,.3)}50%{text-shadow:0 0 16px rgba(255,205,90,.95)}}
@keyframes ptsShake{0%,86%,100%{transform:none}89%{transform:translateX(-2px)}93%{transform:translateX(2px)}97%{transform:translateX(-1px)}}
@keyframes ptsHue{0%{filter:hue-rotate(0)}100%{filter:hue-rotate(360deg)}}
#ovBox .total .sub2{font-size:12px;font-weight:700;color:#8fae9c;margin-left:8px}
.stick{display:inline-block;width:34px;height:7px;border-radius:4px;background:var(--ivory);
  position:relative;vertical-align:middle}
.stick::after{content:"";position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px;
  border-radius:50%;background:var(--man)}
.turnDot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;
  box-shadow:0 0 8px var(--accent)}
.turnDot.off{background:transparent;box-shadow:none;border:1px solid var(--line)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===== 17歩 追加 ===== */
.fixedrow{display:flex;gap:1px;justify-content:flex-start;padding:0 4px;flex-wrap:wrap;min-height:35px;align-items:flex-end}
.fixedrow.cpu{justify-content:flex-end}
#pFixed{justify-content:center}
#selGrid{display:flex;flex-wrap:wrap;gap:2px;padding:6px 2px}
#selStat{display:flex;align-items:center;gap:5px;font-size:13px;min-height:34px;padding:0 4px;flex-wrap:wrap}
#pHand.pool{flex-wrap:wrap;gap:3px;row-gap:5px;justify-content:flex-start}
#pHand.pool .tile{width:calc((min(100vw,520px) - 66px)/11);height:calc((min(100vw,520px) - 66px)/11*1.36)}
.tile.warnT::after{content:"";position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:var(--warn);box-shadow:0 0 0 1px rgba(0,0,0,.35)}
.tile.used{filter:grayscale(1);opacity:.3}
#app.sel #pRiver{display:none}
#app.sel #pFixed{display:none}
#ruleHint{border:1px dashed rgba(236,223,180,.35);border-radius:12px;padding:12px 14px;font-size:12px;line-height:1.9;color:rgba(239,233,214,.8);margin:2px 0 4px}
#app:not(.firstsel) #ruleHint{display:none}
#app:not(.sel) #selGrid{display:none}
#app:not(.sel) #selStat{display:none}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>17歩</h1>
    <div id="hdrBtns">
      <button id="newBtn" type="button">新規</button>
      <button id="achBtn" type="button">実績</button>
      <button id="homeBtn" type="button">⌂ トップへ</button>
    </div>
  </header>
  <div class="pbar" id="cpuBar"></div>
  <div class="fixedrow cpu" id="cpuFixed"></div>
  <div class="river" id="cpuRiver"></div>
  <div id="center">
    <div class="row1">
      <span class="rname" id="roundName"></span>
      <span class="kv" id="honbaPot"></span>
      <span class="kv" id="wallCnt"></span>
    </div>
    <div class="row2">
      <span class="lbl">ドラ</span>
      <div id="doraRow"></div>
    </div>
  </div>
  <div class="river" id="pRiver"></div>
  <div id="ruleHint">ごきげんよう｡34枚の中から13枚を選んで聴牌形を組み立てますのよ｡<br>残る17枚を1枚ずつ切り合い､相手の捨て牌で和了れますわ｡<br>手牌をタップして13枚を選び､確定なさってくださいまし｡</div>
  <div id="selGrid"></div>
  <div class="fixedrow" id="pFixed"></div>
  <div class="pbar" id="pBar"></div>
  <div id="pHand"></div>
  <div id="selStat"></div>
  <div id="actions"></div>
</div>
<div id="overlay" hidden><div id="ovBox"></div></div>
<div id="toasts"></div>
<script>
'use strict';
/* ======================= 牌定義 (34種) ======================= */
const SUIT_JP=["萬","筒","索"], HONOR_JP=["東","南","西","北","白","發","中"];
const DRAGONS=[31,32,33], WINDS=[27,28,29,30];
const YAOCHU=[0,8,9,17,18,26,27,28,29,30,31,32,33];
const YAOCHU_SET=new Set(YAOCHU);
const GREEN_SET=new Set([19,20,21,23,25,32]);
function tileName(t){ return t<27 ? (t%9+1)+SUIT_JP[(t/9)|0] : HONOR_JP[t-27]; }
function tileCls(t){ return t<9?"m":t<18?"p":t<27?"s":t<31?"zw":["zd-h","zd-g","zd-r"][t-31]; }
function doraFromIndicator(i){
  i%=100;
  if(i<27)return (i%9===8)?i-8:i+1;
  if(i<31)return (i===30)?27:i+1;
  return (i===33)?31:i+1;
}
const norm=t=>t%100;
const isAka=t=>t>=100;
function emptyCounts(){ return new Array(34).fill(0); }
function countsOf(arr){ const c=emptyCounts(); for(const t of arr)c[norm(t)]++; return c; }
/* ======================= 乱数 ======================= */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let rng=mulberry32((Math.random()*0x7fffffff)|0);
function setSeed(s){ rng=mulberry32(s|0); }
let FAST_BUILD=false;
function setFastBuild(v){ FAST_BUILD=!!v; }
/* ======================= 和了形判定 ======================= */
function decompose(c,i){
  while(i<34&&c[i]===0)i++;
  if(i>=34)return true;
  if(c[i]>=3){ c[i]-=3; const ok=decompose(c,i); c[i]+=3; if(ok)return true; }
  if(i<27&&i%9<=6&&c[i+1]>0&&c[i+2]>0){
    c[i]--;c[i+1]--;c[i+2]--;
    const ok=decompose(c,i);
    c[i]++;c[i+1]++;c[i+2]++;
    if(ok)return true;
  }
  return false;
}
function winStd(c){
  for(let p=0;p<34;p++){
    if(c[p]<2)continue;
    c[p]-=2;
    const ok=decompose(c,0);
    c[p]+=2;
    if(ok)return true;
  }
  return false;
}
function winChiitoi(c){ let p=0;
  for(let t=0;t<34;t++){ if(c[t]===2)p++; else if(c[t]!==0)return false; }
  return p===7; }
function winKokushi(c){ let sum=0;
  for(let t=0;t<34;t++){ if(c[t]>0&&!YAOCHU_SET.has(t))return false; sum+=c[t]; }
  for(const t of YAOCHU)if(c[t]<1)return false;
  return sum===14; }
function winAny(c){ return winStd(c)||winChiitoi(c)||winKokushi(c); }
/* ======================= シャンテン ======================= */
function shantenChiitoi(c){ let pairs=0,kinds=0;
  for(let i=0;i<34;i++){ if(c[i]>0)kinds++; if(c[i]>=2)pairs++; }
  return 6-pairs+Math.max(0,7-kinds); }
function shantenKokushi(c){ let kinds=0,pair=0;
  for(const i of YAOCHU){ if(c[i]>0)kinds++; if(c[i]>=2)pair=1; }
  return 13-kinds-pair; }
function shantenNormal(c){
  const w=c.slice();
  let best=8, total=0;
  for(let i=0;i<34;i++)total+=w[i];
  function dfs(i,m,t,p,q){
    const score=8-2*m-t-p;

    if(score-room>=best)return;
    while(i<34&&w[i]===0)i++;
    if(i>=34){ if(score<best)best=score; return; }
    dfs(i+1,m,t,p,q-w[i]);
    if(w[i]>=3&&m<4){ w[i]-=3; dfs(i,m+1,t,p,q-3); w[i]+=3; }
    if(w[i]>=2&&p===0){ w[i]-=2; dfs(i,m,t,1,q-2); w[i]+=2; }
    if(w[i]>=2&&m+t<4){ w[i]-=2; dfs(i,m,t+1,p,q-2); w[i]+=2; }
    if(i<27&&i%9<=6){
      if(w[i+1]>0&&w[i+2]>0&&m<4){
        w[i]--;w[i+1]--;w[i+2]--;
        dfs(i,m+1,t,p,q-3);
        w[i]++;w[i+1]++;w[i+2]++;
      }
      if(w[i+2]>0&&m+t<4){
        w[i]--;w[i+2]--;
        dfs(i,m,t+1,p,q-2);
        w[i]++;w[i+2]++;
      }
    }
    if(i<27&&i%9<=7&&w[i+1]>0&&m+t<4){
      w[i]--;w[i+1]--;
      dfs(i,m,t+1,p,q-2);

function allDecompsReal(c){
  const res=[];
  for(let p=0;p<34;p++){
    if(c[p]<2)continue;
    c[p]-=2;
    const sets=[];
    (function go(i){
      while(i<34&&c[i]===0)i++;
      if(i>=34){ res.push({pair:p,sets:sets.slice()}); return; }
      const v=c[i];
      for(let tri=(v>=3?1:0);tri>=0;tri--){
        const runs=v-3*tri;
        if(runs>0&&(i>=27||i%9>6||c[i+1]<runs||c[i+2]<runs))continue;
        c[i]-=3*tri+runs;
        if(runs){ c[i+1]-=runs; c[i+2]-=runs; }
        for(let r=0;r<tri;r++)sets.push({k:1,t:i});
        for(let r=0;r<runs;r++)sets.push({k:0,t:i});
        go(i+1);
        for(let r=0;r<tri+runs;r++)sets.pop();
        c[i]+=3*tri+runs;
        if(runs){ c[i+1]+=runs; c[i+2]+=runs; }
      }
    })(0);
    c[p]+=2;
  }
  return res;
}
function shapeCands(dec,w){

    }else{

      else if(w===s.t+1)cands.push({shape:"kanchan",ronSet:ix});

function isJunsei13(c){

  }

  }

const a2=(a,b)=>(a%100-b%100)||(a-b);
function stdYakuman(dec,shape,c){
  const triT=dec.sets.filter(s=>s.k===1).map(s=>s.t);
  const types=presentTypes(c);
  const ym=[];
  if(triT.length===4&&shape==="tanki")ym.push("suuankou");
  if(DRAGONS.every(d=>triT.includes(d)))ym.push("daisangen");
  if(types.every(t=>t>=27))ym.push("tsuuiisou");
  if(types.every(t=>GREEN_SET.has(t)))ym.push("ryuuiisou");
  if(types.every(t=>t<27&&(t%9===0||t%9===8)))ym.push("chinroutou");
  const wcnt=WINDS.filter(w=>triT.includes(w)).length;
  if(wcnt===4)ym.push("daisuushi");
  else if(wcnt===3&&WINDS.includes(dec.pair))ym.push("shousuushi");
  if(isChuuren(c))ym.push("chuuren");
  return ym;
}
function stdYaku(dec,shape,ronSet,ctx,c){
  const sets=dec.sets, P=dec.pair;
  const runs=sets.filter(s=>s.k===0);
  const triT=sets.filter(s=>s.k===1).map(s=>s.t);
  const ankoN=sets.filter((s,ix)=>s.k===1&&!(shape==="shanpon"&&ix===ronSet)).length;
  const types=presentTypes(c);
  const y=[];
  if(ctx.riichi)y.push(["riichi",1]);
  if(ctx.ippatsu)y.push(["ippatsu",1]);
  const pinfu=runs.length===4&&shape==="ryanmen"&&P<31&&P!==ctx.seatWind&&P!==ctx.roundWind;
  if(pinfu)y.push(["pinfu",1]);
  if(types.every(t=>!YAOCHU_SET.has(t)))y.push(["tanyao",1]);
  const rs=runs.map(s=>s.t).sort(a2);
  let peiko=0;
  for(let k=0;k<rs.length;){ let j=k; while(j<rs.length&&rs[j]===rs[k])j++; peiko+=((j-k)>>1); k=j; }
  if(peiko>=2)y.push(["ryanpeiko",3]);
  else if(peiko===1)y.push(["iipeiko",1]);
  if(triT.includes(31))y.push(["haku",1]);
  if(triT.includes(32))y.push(["hatsu",1]);
  if(triT.includes(33))y.push(["chun",1]);
  if(triT.includes(ctx.seatWind))y.push(["jikaze",1]);
  if(triT.includes(ctx.roundWind))y.push(["bakaze",1]);
  if(ctx.houtei)y.push(["houtei",1]);
  if(triT.length===4)y.push(["toitoi",2]);
  if(ankoN>=3)y.push(["sanankou",2]);
  for(let n=0;n<9;n++)if(triT.includes(n)&&triT.includes(9+n)&&triT.includes(18+n)){ y.push(["sanshokudoukou",2]); break; }
  for(let n=0;n<7;n++)if(rs.includes(n)&&rs.includes(9+n)&&rs.includes(18+n)){ y.push(["sanshokudoujun",2]); break; }
  for(let s3=0;s3<3;s3++)if(rs.includes(s3*9)&&rs.includes(s3*9+3)&&rs.includes(s3*9+6)){ y.push(["ittsuu",2]); break; }
  const allYao=types.every(t=>YAOCHU_SET.has(t));
  if(allYao)y.push(["honroutou",2]);
  else if(runs.length>=1&&YAOCHU_SET.has(P)
    &&runs.every(s=>s.t%9===0||s.t%9===6)
    &&triT.every(t=>YAOCHU_SET.has(t))){
    y.push(types.some(t=>t>=27)?["chanta",2]:["junchan",3]);
  }
  if(DRAGONS.filter(d=>triT.includes(d)).length===2&&DRAGONS.includes(P))y.push(["shousangen",2]);
  const suits=new Set(); let hon=false;
  for(const t of types){ if(t>=27)hon=true; else suits.add((t/9)|0); }
  if(suits.size===1)y.push(hon?["honitsu",3]:["chinitsu",6]);
  return {y,pinfu};
}
function calcFu(dec,shape,ronSet,ctx,pinfu){
  if(pinfu)return 30;
  let fu=30;
  dec.sets.forEach((s,ix)=>{
    if(s.k!==1)return;
    const yao=YAOCHU_SET.has(s.t);
    const open=(shape==="shanpon"&&ix===ronSet);
    fu+=open?(yao?4:2):(yao?8:4);
  });
  const P=dec.pair;
  if(P>=31)fu+=2;
  if(P===ctx.seatWind)fu+=2;
  if(P===ctx.roundWind)fu+=2;
  if(shape==="tanki"||shape==="kanchan"||shape==="penchan")fu+=2;
  return Math.ceil(fu/10)*10;
}
function basePoints(han,fu,yn){
  if(yn>0)return 8000*yn;
  if(han>=13)return 8000;
  if(han>=11)return 6000;
  if(han>=8)return 4000;
  if(han>=6)return 3000;
  if(han>=5)return 2000;
  const b=fu*Math.pow(2,2+han); return b>=1920?2000:b;
}
function winPoints(han,fu,yn,isDealer){
  return Math.ceil(basePoints(han,fu,yn)*(isDealer?6:4)/100)*100;
}
function limitName(han,fu,yn){

  if(han>=13)return "数え役満"; if(han>=11)return "三倍満";

/* 和了解析: o={counts14,winTile,riichi,ippatsu,houtei,seatWind,roundWind,
   isDealer,doraTiles[2],uraTiles[2]} 全てロン･門前前提 */
function analyzeWin(o){
  const c=o.counts14;
  let total=0; for(let t=0;t<34;t++)total+=c[t];
  if(total!==14)return null;
  const doraTiles=o.doraTiles||[], uraTiles=o.uraTiles||[];
  let doraHan=0; for(const d of doraTiles)doraHan+=c[d];
  let uraHan=0; if(o.riichi){ for(const d of uraTiles)uraHan+=c[d]; }
  const akaHan=o.aka|0;
  const cands=[];
  if(winKokushi(c)){
    const pre=c.slice(); pre[o.winTile]--;
    cands.push({ym:[YAOCHU.every(t=>pre[t]>=1)?"kokushi13":"kokushi"]});
  }
  if(winChiitoi(c)){
    const types=presentTypes(c);
    if(types.every(t=>t>=27)){
      cands.push({ym:["tsuuiisou"]});
    }else{
      const y=[["chiitoi",2]];
      if(o.riichi)y.push(["riichi",1]);
      if(o.ippatsu)y.push(["ippatsu",1]);
      if(o.houtei)y.push(["houtei",1]);
      if(types.every(t=>!YAOCHU_SET.has(t)))y.push(["tanyao",1]);
      if(types.every(t=>YAOCHU_SET.has(t)))y.push(["honroutou",2]);
      const suits=new Set(); let hon=false;
      for(const t of types){ if(t>=27)hon=true; else suits.add((t/9)|0); }
      if(suits.size===1)y.push(hon?["honitsu",3]:["chinitsu",6]);
      cands.push({y,fu:25});
    }
  }
  if(winStd(c)){
    for(const dec of allDecompsReal(c)){
      for(const sc of shapeCands(dec,o.winTile)){
        const ym=stdYakuman(dec,sc.shape,c);
        if(ym.includes("chuuren")){
          const pre=c.slice(); pre[o.winTile]--;
          if(isJunsei13(pre))ym[ym.indexOf("chuuren")]="chuuren9";
        }
        if(ym.length){ cands.push({ym}); continue; }
        const r=stdYaku(dec,sc.shape,sc.ronSet,o,c);
        cands.push({y:r.y,fu:calcFu(dec,sc.shape,sc.ronSet,o,r.pinfu)});
      }
    }
  }
  if(!cands.length)return null;
  let best=null, bestKey=null;
  for(const cd of cands){
    let out,key;
    if(cd.ym){
      const seen=new Set(), ymu=cd.ym.filter(id=>!seen.has(id)&&seen.add(id));
      const yn=ymu.length;
      out={yakuman:ymu.map(id=>[id,1]),yakumanN:yn,yaku:[],han:0,fu:0,doraHan:0,uraHan:0,akaHan:0,
        pts:winPoints(0,0,yn,o.isDealer)};
      key=[out.pts,99,0];
    }else{
      const yHan=cd.y.reduce((a,x)=>a+x[1],0);
      if(yHan===0)continue;
      const han=yHan+doraHan+uraHan+akaHan;
      out={yakuman:[],yakumanN:0,yaku:cd.y,han,fu:cd.fu,doraHan,uraHan,akaHan,
        pts:winPoints(han,cd.fu,0,o.isDealer)};
      key=[out.pts,han,cd.fu];
    }
    if(!best||key[0]>bestKey[0]
      ||(key[0]===bestKey[0]&&(key[1]>bestKey[1]||(key[1]===bestKey[1]&&key[2]>bestKey[2])))){
      best=out; bestKey=key;
    }
  }
  return best;
}
/* ======================= CPU: 手牌構築 ======================= */
function buildHand(t34,doraTiles,fast){
  const fastMode=!!fast||FAST_BUILD;
  const cnt34=countsOf(t34);
  const live=w=>Math.max(0,4-cnt34[w]);
  const ctxEval={riichi:true,ippatsu:false,houtei:false,seatWind:27,roundWind:27,
    isDealer:false,doraTiles:doraTiles||[],uraTiles:[]};
  function scoreTenpai(c13){
    const ws=waitsOf(c13);
    if(!ws.length)return null;
    let sc=0;
    for(const w of ws){
      const lv=live(w); if(lv<=0)continue;
      c13[w]++;
      const r=analyzeWin(Object.assign({counts14:c13,winTile:w},ctxEval));
      c13[w]--;
      if(r)sc+=lv*r.pts;
    }
    return {waits:ws,score:sc};
  }
  function climb(c13,cur){
    let g2=0, improved=true;
    while(improved&&g2++<6){
      improved=false;
      let tried=0;
      for(let o=0;o<34&&!improved&&tried<=100;o++){
        if(c13[o]===0)continue;
        for(let u=0;u<34&&!improved&&tried<=100;u++){
          if(u===o||c13[u]>=cnt34[u])continue;
          tried++;
          c13[o]--;c13[u]++;
          let took=false;
          if(shanten(c13)===0){
            const r=scoreTenpai(c13);
            if(r&&r.score>cur.score){ cur=r; improved=true; took=true; }
          }
          if(!took){ c13[o]++;c13[u]--; }
        }
      }
    }
    return cur;
  }
  function localSearch(c13){
    let kicks=0;
    for(let guard=0;guard<80;guard++){
      const sh=shanten(c13);
      if(sh===0){
        let cur=scoreTenpai(c13);
        if(cur){
          if(!fastMode)cur=climb(c13,cur);
          return {c13,waits:cur.waits,score:cur.score};
        }
      }
      let bestSw=null,bestSh=sh;
      for(let o=0;o<34;o++){
        if(c13[o]===0)continue;
        for(let u=0;u<34;u++){
          if(u===o||c13[u]>=cnt34[u])continue;
          c13[o]--;c13[u]++;
          const s2=shanten(c13);
          if(s2<bestSh){ bestSh=s2; bestSw=[o,u]; }
          c13[o]++;c13[u]--;
        }
      }
      if(bestSw){ c13[bestSw[0]]--; c13[bestSw[1]]++; continue; }
      if(kicks++>=4)return null;
      for(let k=0;k<2;k++){
        const outs=[],ins=[];
        for(let t=0;t<34;t++){ if(c13[t]>0)outs.push(t); if(c13[t]<cnt34[t])ins.push(t); }
        if(!outs.length||!ins.length)return null;
        const o=outs[(rng()*outs.length)|0], u=ins[(rng()*ins.length)|0];
        if(o!==u){ c13[o]--; c13[u]++; }
      }
    }
    return null;
  }
  function randSeed(){
    const pool=t34.slice();
    for(let i=pool.length-1;i>0;i--){ const j=(rng()*(i+1))|0; const x=pool[i];pool[i]=pool[j];pool[j]=x; }
    return countsOf(pool.slice(0,13));
  }
  function chiitoiSeed(){
    const pairs=[],singles=[];
    for(let t=0;t<34;t++){
      if(cnt34[t]>=2)pairs.push(t);
      if(cnt34[t]>=1)singles.push(t);
    }
    if(pairs.length<6)return null;
    pairs.sort((a,b)=>live(b)-live(a));
    const c=emptyCounts();
    for(let k=0;k<6;k++)c[pairs[k]]+=2;
    let bs=-1,bl=-1;
    for(const t of singles){ if(c[t]>0)continue; const lv=live(t); if(lv>bl){bl=lv;bs=t;} }
    if(bs<0&&pairs.length>=7)bs=pairs[6];
    if(bs<0)return null;
    c[bs]++;
    let n=0; for(let t=0;t<34;t++)n+=c[t];
    if(n!==13)return null;
    return c;
  }
  function meldSeed(){
    const c=cnt34.slice(), h=emptyCounts();
    let picked=0;
    const tryRun=st=>{ if(st<27&&st%9<=6&&c[st]>0&&c[st+1]>0&&c[st+2]>0&&picked<=10){
      c[st]--;c[st+1]--;c[st+2]--; h[st]++;h[st+1]++;h[st+2]++; picked+=3; return true;} return false; };
    for(let n=1;n<=6;n++){ for(let s=0;s<3;s++){ if(picked>10)break; tryRun(s*9+n); } }
    for(let t=0;t<34&&picked<=10;t++){ if(c[t]>=3){ c[t]-=3; h[t]+=3; picked+=3; } }
    for(let s=0;s<3;s++)for(let n=0;n<7&&picked<=10;n++)tryRun(s*9+n);
    for(let t=0;t<34&&picked<12;t++){ if(c[t]>=2){ c[t]-=2; h[t]+=2; picked+=2; break; } }
    const order=[];
    for(let t=0;t<34;t++)for(let k=0;k<c[t];k++)order.push(t);
    for(let i=order.length-1;i>0;i--){ const j=(rng()*(i+1))|0; const x=order[i];order[i]=order[j];order[j]=x; }
    let k=0;
    while(picked<13&&k<order.length){ h[order[k]]++; c[order[k]]--; picked++; k++; }
    return picked===13?h:null;
  }
  const seeds=[];
  const ms=meldSeed(); if(ms)seeds.push(ms);
  const cs=chiitoiSeed(); if(cs)seeds.push(cs);
  const nR=fastMode?2:3;
  for(let k=0;k<nR;k++)seeds.push(randSeed());
  let best=null;
  for(const s of seeds){
    const r=localSearch(s.slice());
    if(r&&(!best||r.score>best.score)){
      best=r;
      if(fastMode)break;
    }
  }
  if(!best)return null;
  const hand=[];
  for(let t=0;t<34;t++)for(let k=0;k<best.c13[t];k++)hand.push(t);
  return {hand,waits:best.waits,score:best.score};
}

const memStore={};
async function stGet(k){
  try{ if(typeof window!=="undefined"&&window.storage){
    const r=await window.storage.get(k);
    if(r&&r.value!=null)return r.value;
  }}catch(e){}
  try{ const v=localStorage.getItem(k); if(v!=null)return v; }catch(e){}
  return (k in memStore)?memStore[k]:null;
}

  try{ if(typeof window!=="undefined"&&window.storage){ await window.storage.set(k,v); } }catch(e){}
  try{ localStorage.setItem(k,v); }catch(e){}
}

const YAKU_NAME=Object.fromEntries(ACHV.map(a=>[a[0],a[1]]));
const ACHV_KEY="17po_achv";
let unlocked=new Set();
async function loadAchv(){
  try{ const v=await stGet(ACHV_KEY); if(v)unlocked=new Set(JSON.parse(v)); }catch(e){}
}
function saveAchv(){ stSet(ACHV_KEY,JSON.stringify(Array.from(unlocked))); }
function grantAchv(ids){
  const fresh=ids.filter(id=>YAKU_NAME[id]&&!unlocked.has(id));
  if(!fresh.length)return;
  fresh.forEach(id=>unlocked.add(id));
  saveAchv();
  fresh.forEach((id,k)=>setTimeout(()=>toast("実績解除ですわ　"+YAKU_NAME[id]),k*500));
}

let SLEEP_SCALE=1;
function setSleepScale(x){ SLEEP_SCALE=x; }
let sleep=ms=>new Promise(r=>setTimeout(r,Math.max(1,ms*SLEEP_SCALE)));
/* ======================= 対局状態 ======================= */
const G={};
const ROUND_NAMES=["東1局","東2局","南1局","南2局"];
function dealerIdx(){ return G.round%2; }
function roundWind(){ return G.round<2?27:28; }
function seatWind(i){ return i===dealerIdx()?27:28; }
function mkP(){ return {hand34:[],hand:[],pool:[],river:[],waits:[],
  riichi:false,ippatsuArmed:false,furitenMissed:false,reserve:emptyCounts(),overflow:emptyCounts()}; }
function newGame(){
  G.scores=[50000,50000]; G.round=0; G.pot=0; G.over=false;
  startHand();
}
async function startHand(){
  let guard=0, deal=null;
  while(guard++<60){
    const deck=[]; for(let t=0;t<34;t++)for(let k=0;k<4;k++)deck.push(t);
    for(const rt of [4,13,22]){ deck[deck.indexOf(rt)]=rt+100; }
    for(let i=deck.length-1;i>0;i--){ const j=(rng()*(i+1))|0;
      const tmp=deck[i]; deck[i]=deck[j]; deck[j]=tmp; }
    const d=dealerIdx();
    const hands=[];
    hands[d]=deck.slice(0,34); hands[1-d]=deck.slice(34,68);
    const doraInd=deck.slice(68,70), uraInd=deck.slice(70,72);
    const doraTiles=doraInd.map(doraFromIndicator);
    const b0=buildHand(hands[0],doraTiles,true), b1=buildHand(hands[1],doraTiles);
    if(b0&&b1){ deal={hands,doraInd,uraInd,cpuBuild:b1}; break; }
  }
  if(!deal){ console.error("配牌不成立"); return; }
  G.players=[mkP(),mkP()];
  G.players[0].hand34=deal.hands[0].slice().sort(a2);
  G.players[1].hand34=deal.hands[1].slice().sort(a2);
  G.doraInd=deal.doraInd; G.uraInd=deal.uraInd;
  G.discCounts=[0,0]; G.revealCPU=false; G.phase="select"; G.sel=null;
  G.cur=dealerIdx();
  applyBuild(1,{hand:rawify(G.players[1].hand34,deal.cpuBuild.hand),waits:deal.cpuBuild.waits});
  render();
  await sleep(400);
  await selectPhase();
  render();
  await sleep(250);
  discardLoop();
}
function rawify(hand34,normHand){
  const rest=hand34.slice();
  const out=[];
  for(const t of normHand){
    let ix=rest.indexOf(t+100);
    if(ix<0)ix=rest.findIndex(x=>norm(x)===t);
    out.push(rest[ix]); rest.splice(ix,1);
  }
  return out;
}
function applyBuild(i,b){
  const p=G.players[i];
  p.hand=b.hand.slice().sort(a2);
  const rest=p.hand34.slice();
  for(const t of p.hand){ const ix=rest.indexOf(t); if(ix>=0)rest.splice(ix,1); }
  p.pool=rest.sort(a2);
  p.waits=b.waits?b.waits.slice():waitsOf(countsOf(p.hand));
  p.reserve=emptyCounts(); p.overflow=emptyCounts();
  let kept=0;
  const poolC=countsOf(p.pool);
  for(const w of p.waits){
    for(let k=0;k<poolC[w];k++){
      if(kept<4){ p.reserve[w]++; kept++; }
      else p.overflow[w]++;
    }
  }
}
function declareRiichi(i){
  const p=G.players[i];
  p.riichi=true;
  p.ippatsuArmed=true;
  G.scores[i]-=1000;
  G.pot+=1000;
  render();
}
/* ======================= 手牌選択フェーズ(人間) ======================= */
function pickedTiles(){
  const p=G.players[0];
  return [...G.sel.picked].map(ix=>p.hand34[ix]).sort(a2);
}
function tilesToPos(hand34,tiles){
  const used=new Array(hand34.length).fill(false);
  const pos=new Set();
  for(const t of tiles){
    for(let i=0;i<hand34.length;i++){
      if(!used[i]&&hand34[i]===t){ used[i]=true; pos.add(i); break; }
    }
  }
  return pos;
}
async function selectPhase(){
  const p=G.players[0];
  G.sel={picked:new Set(),tenpai:false,waits:[],sh:null};
  while(true){
    const tiles=pickedTiles();
    G.sel.tenpai=false; G.sel.waits=[]; G.sel.sh=null;
    if(tiles.length===13){
      const c=countsOf(tiles);
      G.sel.sh=shanten(c);
      if(G.sel.sh===0){
        G.sel.waits=waitsOf(c);
        G.sel.tenpai=G.sel.waits.length>0;
      }
    }
    const btns=[];
    if(G.sel.tenpai)btns.push({label:"確定ですわ",val:{a:"ok"}});
    const v=await awaitInput({tiles:"sel",buttons:btns});
    if(v.type==="pos"){
      if(G.sel.picked.has(v.pos))G.sel.picked.delete(v.pos);
      else if(G.sel.picked.size<13)G.sel.picked.add(v.pos);
      continue;
    }
    if(v.a==="noop")continue;
    if(v.a==="ok"&&G.sel.tenpai)break;
  }
  const tiles=pickedTiles();
  applyBuild(0,{hand:tiles,waits:G.sel.waits});
  G.sel=null;
  G.phase="discard";
  render();
}
/* ======================= 打牌フェーズ ======================= */
async function discardLoop(){
  while(G.discCounts[0]+G.discCounts[1]<34){
    if(G.over)return;
    const i=G.cur, p=G.players[i];
    let decl=false;
    if(G.discCounts[i]===0&&!p.riichi&&p.waits.length>0){
      decl=true;
      if(i===1){ render(); await sleep(400); }
      declareRiichi(i);
      await callout("リーチ",i);
    }
    let tile;
    if(i===0){
      render();
      const v=await awaitInput({tiles:new Set(p.pool)});
      tile=v.tile;
    }else{
      render();
      await sleep(decl?150:550);
      tile=cpuPickDiscard(i);
    }
    await doDiscard(i,tile,decl);
    const r=await reactions(i,tile);
    if(r==="win")return;
    G.cur=1-i;
  }
  await ryuukyoku();
}
async function doDiscard(i,tile,riichiDecl){
  const p=G.players[i];
  const ix=p.pool.indexOf(tile);
  if(ix>=0)p.pool.splice(ix,1);
  const nt=norm(tile);
  if(p.reserve[nt]>0&&countsOf(p.pool)[nt]<p.reserve[nt])p.reserve[nt]--;
  if(p.overflow[nt]>0)p.overflow[nt]--;
  p.river.push({t:tile,riichi:!!riichiDecl});
  G.discCounts[i]++;
  render();
  await sleep(220);
}
function isFuriten(j){
  const p=G.players[j];
  if(p.furitenMissed)return true;
  return p.waits.some(w=>p.river.some(e=>e.t===w));
}
async function reactions(i,tile){
  const opp=1-i, po=G.players[opp];
  const houtei=(G.discCounts[0]+G.discCounts[1]===34);
  const nt=norm(tile);
  const inWaits=po.waits.includes(nt);
  let act="pass", res=null;
  if(inWaits&&!isFuriten(opp)){
    const c=countsOf(po.hand); c[nt]++;
    let aka=isAka(tile)?1:0;
    for(const x of po.hand)if(isAka(x))aka++;
    res=analyzeWin({
      counts14:c, winTile:nt, aka,
      riichi:po.riichi,
      ippatsu:po.riichi&&po.ippatsuArmed,
      houtei,
      seatWind:seatWind(opp), roundWind:roundWind(),
      isDealer:opp===dealerIdx(),
      doraTiles:G.doraInd.map(doraFromIndicator),
      uraTiles:po.riichi?G.uraInd.map(doraFromIndicator):[]
    });
    if(res&&(res.yakumanN>0||res.yaku.length>0)){
      if(opp===0)act=await humanReact({ron:true});
      else act="ron";
      if(act==="ron"&&opp===1)await sleep(380);
    }
  }
  if(act==="ron"){
    await settleWin(opp,tile,res);
    return "win";
  }
  if(inWaits)po.furitenMissed=true;
  po.ippatsuArmed=false;
  return "pass";
}
async function settleWin(i,winTile,res){
  await callout("ロン",i);
  const p=G.players[i];
  if(i===1)G.revealCPU=true;
  const pts=res.pts;
  const potWas=G.pot;
  G.scores[i]+=pts+potWas;
  G.scores[1-i]-=pts;
  G.pot=0;
  if(i===0){
    const ids=res.yakumanN?res.yakuman.map(x=>x[0]):res.yaku.map(x=>x[0]);
    grantAchv(ids);
  }
  render();
  const endNow=(G.round===3)&&(i!==dealerIdx()||G.scores[i]>G.scores[1-i]);
  await showResult(i,winTile,res,pts,potWas,endNow);
  if(G.over)return;
  if(endNow){ await gameEnd(); return; }
  if(i!==dealerIdx())G.round++;
  if(G.round>3){ await gameEnd(); return; }
  startHand();
}

  G.revealCPU=true;
  render();
  let h="<h2>流局ですわ…</h2>";
  for(const i of [0,1]){
    const p=G.players[i];
    const ten=p.waits.length>0;
    h+='<div class="yline"><span>'+(i===0?"お嬢様":"CPU")+"</span><span>"
      +(ten?"聴牌ですわ":"ノーテンですの…")+"</span></div>";
    h+='<div class="handrow">'+p.hand.map(t=>tileHTML(t,(i===1)?"xs flip":"xs")).join("")+"</div>";
    if(ten)h+='<div class="handrow"><span class="lbl" style="margin-right:6px">お待ち牌</span>'
      +p.waits.map(t=>tileHTML(t,"xs")).join("")+"</div>";
  }
  h+='<div class="yline"><span>点数移動</span><span>ございませんわ</span></div>';
  if(G.pot>0)h+='<div class="yline"><span>供託</span><span>'+G.pot+'点 持ち越しですわ</span></div>';
  await showOverlay(h,[{label:"次局へ参りますわ",val:1}]);
  if(!(G.players[dealerIdx()].waits.length>0))G.round++;
  if(G.round>3){ await gameEnd(); return; }
  startHand();
}
async function gameEnd(){
  G.over=true;
  if(G.pot>0){
    if(G.scores[0]>G.scores[1])G.scores[0]+=G.pot;
    else if(G.scores[1]>G.scores[0])G.scores[1]+=G.pot;
    else{ G.scores[0]+=G.pot/2; G.scores[1]+=G.pot/2; }
    G.pot=0;
  }
  const a=G.scores[0], b=G.scores[1];
  const ttl=a>b?"お嬢様の勝利ですわ！":(a<b?"CPUの勝利ですわ…":"引き分けですわ");
  let h='<h2>終局ですわ</h2><div class="total">'+ttl+"</div>";
  h+='<div class="yline"><span>お嬢様</span><span>'+a+"点</span></div>";
  h+='<div class="yline"><span>CPU</span><span>'+b+"点</span></div>";
  render();
  await showOverlay(h,[{label:"もう一局ですわ",val:1}]);
  newGame();
}
/* ======================= CPU: 打牌選択 ======================= */
function seenBy(i,t){
  let s=0;
  const p=G.players[i];
  for(const x of p.hand)if(norm(x)===t)s++;
  for(const x of p.pool)if(norm(x)===t)s++;
  for(const pl of G.players)for(const e of pl.river)if(norm(e.t)===t)s++;
  for(const d of G.doraInd)if(norm(d)===t)s++;
  return s;
}
function cpuPickDiscard(i){
  const p=G.players[i], opp=G.players[1-i];
  const oppRiver=new Set(opp.river.map(e=>e.t));
  const poolC=countsOf(p.pool);
  const cands=[];
  for(let t=0;t<34;t++){
    if(poolC[t]===0)continue;
    const free=poolC[t]-p.reserve[t];
    if(free<=0&&p.overflow[t]===0)continue;
    let pr;
    if(p.overflow[t]>0)pr=0;
    else if(oppRiver.has(t))pr=1;
    else if(t>=27)pr=2+(4-seenBy(i,t))/10;
    else{
      const n=t%9;
      const suji=(n<=2&&oppRiver.has(t+3))||(n>=6&&oppRiver.has(t-3))
        ||(n>=3&&n<=5&&oppRiver.has(t-3)&&oppRiver.has(t+3));
      if(n===0||n===8||suji)pr=3+(n===0||n===8?0:0.05);
      else pr=4+(4-Math.abs(n-4))/10;
    }
    cands.push({t,pr});
  }
  if(!cands.length){
    for(let t=0;t<34;t++)if(poolC[t]>0)cands.push({t,pr:9});
  }
  cands.sort((A,B)=>A.pr-B.pr||(rng()-0.5));
  const tt=cands[0].t;
  for(const x of p.pool)if(x===tt)return x;
  for(const x of p.pool)if(norm(x)===tt)return x;
  return p.pool[0];
}

let inputState=null;
function awaitInput(o){
  return new Promise(res=>{
    inputState={tiles:o.tiles||null,buttons:o.buttons||[],hint:o.hint||"",resolve:res};
    render();
  });
}
function tileTap(t){
  if(!inputState||!inputState.tiles||inputState.tiles==="sel")return;
  if(!inputState.tiles.has(t))return;
  const r=inputState; inputState=null;
  r.resolve({type:"tile",tile:t});
}
function selTap(pos){
  if(!inputState||inputState.tiles!=="sel")return;
  const r=inputState; inputState=null;
  r.resolve({type:"pos",pos:pos});
}
async function humanReact(can){
  const buttons=[];
  if(can.ron)buttons.push({label:can.ronLabel||"ロン",val:"ron"});
  buttons.push({label:"見逃しますわ",val:"pass",cls:"sub"});
  return await awaitInput({buttons});
}

function tileHTML(t,extra){
  const n=norm(t);
  const cls="tile "+(extra||"")+" "+tileCls(n)+(isAka(t)?" aka":"");
  const src=isAka(t)?TILE_AKA[n]:TILE_IMG[n];
  return '<span class="'+cls+'"><img class="face" src="'+src
    +'" alt="'+(isAka(t)?"赤":"")+tileName(n)+'" draggable="false"></span>';
}
function backHTML(size){ return '<span class="tile back '+(size||"")+'"></span>'; }
function barHTML(i){
  const p=G.players[i];
  const nm=(i===0)?"お嬢様":"CPU";
  const w=(seatWind(i)===27)?"東":"南";
  const dealer=(i===dealerIdx());
  const turn=(G.cur===i&&G.phase==="discard"&&!G.over);
  let flags="";
  if(p.riichi)flags+='<span class="badge">リーチ</span><span class="stick"></span>';
  if(i===0&&G.phase==="discard"&&isFuriten(0))flags+='<span class="badge ft">フリテン</span>';
  const sc=G.scores[i];
  return '<span class="turnDot'+(turn?"":" off")+'"></span>'
    +'<span class="wind'+(dealer?" dealer":"")+'">'+w+"</span>"
    +'<span class="nm">'+nm+"</span>"+flags
    +'<span class="sc'+(sc<0?" minus":"")+'">'+sc+"</span>";
}
function riverHTML(i){
  return G.players[i].river.map((e,ix,arr)=>{
    let cls="xs";
    if(e.riichi)cls+=" side";
    const h=tileHTML(e.t,cls);
    return (i===1)?h.replace('<span class="','<span style="z-index:'+(arr.length-ix)+'" class="'):h;
  }).join("");
}
function tileBtn(t,ok,selMode,extra){
  const dim=(selMode&&!ok)?" dim":"";
  const on=ok?' onclick="tileTap('+t+')"':"";
  return '<button class="tileBtn"'+on+">"+tileHTML(t,(extra||"sm")+dim)+"</button>";
}
function renderSelGrid(){
  const el=document.getElementById("selGrid");
  if(G.phase!=="select"||!G.sel){ el.innerHTML=""; return; }
  const p=G.players[0];
  el.innerHTML=p.hand34.map((t,ix)=>{
    if(G.sel.picked.has(ix))
      return '<span class="tileBtn">'+tileHTML(t,"sm used")+"</span>";
    return '<button class="tileBtn" onclick="selTap('+ix+')">'+tileHTML(t,"sm")+"</button>";
  }).join("");
}
function renderSelStat(){
  const el=document.getElementById("selStat");
  if(G.phase!=="select"||!G.sel){ el.innerHTML=""; return; }
  const n=G.sel.picked.size;
  if(n<13){ el.innerHTML='<span class="lbl">お手牌の選択ですわ</span><span>'+n+" / 13</span>"; return; }
  if(G.sel.sh>0){ el.innerHTML="<span>"+G.sel.sh+"向聴　あと一歩ですわ</span>"; return; }
  if(!G.sel.tenpai){ el.innerHTML="<span>純カラ　お待ちがありませんわ</span>"; return; }
  const cnt34=countsOf(G.players[0].hand34);
  let total=0;
  const ws=G.sel.waits.map(t=>{
    const lv=Math.max(0,4-cnt34[t]); total+=lv;
    return tileHTML(t,"xs");
  }).join("");
  el.innerHTML='<span class="badge">聴牌</span><span class="lbl">お待ち</span>'+ws
    +"<span>残"+total+"枚</span>";
}
function renderHand(){
  const p=G.players[0];
  const el=document.getElementById("pHand");
  if(G.phase==="select"&&G.sel){
    el.classList.remove("pool");
    const arr=[...G.sel.picked].map(ix=>[ix,p.hand34[ix]]).sort((a,b)=>a2(a[1],b[1]));
    el.innerHTML=arr.map(x=>'<button class="tileBtn" onclick="selTap('+x[0]+')">'
      +tileHTML(x[1],"")+"</button>").join("");
    return;
  }
  el.classList.add("pool");
  const selMode=!!(inputState&&inputState.tiles&&inputState.tiles!=="sel");
  const okT=t=>selMode&&inputState.tiles.has(t);
  el.innerHTML=p.pool.map(t=>{
    const warn=p.waits.includes(norm(t))?" warnT":"";
    return tileBtn(t,okT(t),selMode,""+warn);
  }).join("");
}
function renderActionBar(){
  const el=document.getElementById("actions");
  el.innerHTML="";
  if(!inputState)return;
  if(inputState.hint){
    const s=document.createElement("span");
    s.className="hint"; s.innerHTML=inputState.hint;
    el.appendChild(s);
  }
  for(const b of inputState.buttons){
    const btn=document.createElement("button");
    btn.className="btn"+(b.cls?" "+b.cls:"");
    btn.textContent=b.label;
    btn.onclick=()=>{ const r=inputState; inputState=null; r.resolve(b.val); };
    el.appendChild(btn);
  }
}
function assertConservation(){
  try{
    if(!G.players)return;
    for(const p of G.players){
      if(G.phase==="select"){
        if(p.hand34.length&&p.hand34.length!==34)console.error("配牌枚数違反",p.hand34.length);
        if(p.hand.length&&p.hand.length+p.pool.length+p.river.length!==34)
          console.error("牌保存則違反(CPU構築)",p.hand.length,p.pool.length,p.river.length);
      }else{
        const n=p.hand.length+p.pool.length+p.river.length;
        if(n!==34)console.error("牌保存則違反",n);
        if(p.hand.length!==13)console.error("手牌枚数違反",p.hand.length);
      }
    }
    const z=G.scores[0]+G.scores[1]+G.pot;
    if(z!==100000)console.error("ゼロサム違反",z);
  }catch(e){}
}
function render(){
  if(!G.players)return;
  if(typeof document==="undefined")return;
  const app=document.getElementById("app");
  app.classList.toggle("sel",G.phase==="select");
  app.classList.toggle("firstsel",G.phase==="select"&&G.round===0);
  document.getElementById("cpuBar").innerHTML=barHTML(1);
  document.getElementById("pBar").innerHTML=barHTML(0);
  document.getElementById("cpuRiver").innerHTML=riverHTML(1);
  document.getElementById("pRiver").innerHTML=riverHTML(0);
  const cpu=G.players[1], me=G.players[0];
  const cpuHand=G.revealCPU
    ?cpu.hand.slice().sort(a2).map(t=>tileHTML(t,"xs flip")).join("")
    :new Array(cpu.hand.length||34).fill(backHTML("xs")).join("");
  document.getElementById("cpuFixed").innerHTML=
    (G.phase==="select"&&!cpu.hand.length)
      ?new Array(13).fill(backHTML("xs")).join("")
      :cpuHand;
  document.getElementById("pFixed").innerHTML=
    me.hand.map(t=>tileHTML(t,"xs")).join("");
  document.getElementById("roundName").textContent=ROUND_NAMES[Math.min(G.round,3)];
  document.getElementById("honbaPot").textContent="供託"+(G.pot/1000)+"本";
  const rest=34-(G.discCounts?G.discCounts[0]+G.discCounts[1]:0);
  document.getElementById("wallCnt").textContent=
    G.phase==="select"?"お手牌選択":"残"+rest+"打";
  let dr="";
  for(let k=0;k<2;k++)dr+=tileHTML(G.doraInd[k],"xs");
  dr+='<span style="width:8px;display:inline-block"></span>';
  for(let k=0;k<2;k++)dr+=backHTML("xs");
  document.getElementById("doraRow").innerHTML=dr;
  renderSelGrid();
  renderSelStat();
  renderHand();
  renderActionBar();
  assertConservation();
}
/* ======================= オーバーレイ/結果 ======================= */
function overlayOpen(html,fixed,cls){
  const ov=document.getElementById("overlay"), box=document.getElementById("ovBox");
  if(box.classList){box.classList.toggle("fixed",!!fixed);box.classList.toggle("confirm",cls==="confirm");}
  box.innerHTML=html;
  ov.hidden=false;
  box.scrollTop=0;
  return box;
}
function overlayButtons(box,buttons,dismissible,dismissVal){
  return new Promise(res=>{
    const ov=document.getElementById("overlay");
    let done=false, onBackdrop=null;
    const finish=(v)=>{ if(done)return; done=true; ov.hidden=true; if(onBackdrop)ov.removeEventListener("click",onBackdrop); res(v); };
    if(dismissible){
      const dv=(dismissVal===undefined?0:dismissVal);
      const wrap=document.createElement("div"); wrap.className="ovCloseWrap";
      const x=document.createElement("button"); x.type="button"; x.className="ovClose";
      x.setAttribute("aria-label","閉じる"); x.textContent="✕";
      x.onclick=()=>finish(dv);
      wrap.appendChild(x); box.insertBefore(wrap,box.firstChild);
      onBackdrop=(e)=>{ if(e.target===ov)finish(dv); };
      ov.addEventListener("click",onBackdrop);
    }
    const bt=document.createElement("div"); bt.className="obtns";
    for(const b of buttons){
      const el=document.createElement("button");
      el.className="btn"+(b.cls?" "+b.cls:"");
      el.textContent=b.label;
      el.onclick=()=>finish(b.val);
      bt.appendChild(el);
    }
    box.appendChild(bt);
  });
}
function showOverlay(html,buttons,cls,dismissible){
  return overlayButtons(overlayOpen(html,false,cls),buttons,dismissible);
}
function callout(text,who){
  if(typeof document==="undefined"||!document.body)return Promise.resolve();
  return new Promise(res=>{
    const d=document.createElement("div");
    d.className="callout "+(who===1?"top":"bottom");
    d.innerHTML="<span>"+text+"</span>";
    document.body.appendChild(d);
    setTimeout(()=>{ d.remove(); res(); },Math.max(1,950*SLEEP_SCALE));
  });
}
const DISP_ORDER=["daisuushi","shousuushi","daisangen","suuankou","tsuuiisou",
 "ryuuiisou","chinroutou","chuuren9","chuuren","kokushi13","kokushi",

function dispIdx(id){ const k=DISP_ORDER.indexOf(id); return k<0?99:k; }
async function showResult(i,winTile,res,pts,potWas,endNow){
  const p=G.players[i];
  const who=(i===0)?"お嬢様":"CPU";
  let head="<h2>"+who+"のロン和了ですわ</h2>";
  let hrow=p.hand.slice().sort(a2).map(t=>tileHTML(t,"xs")).join("")
    +'<span style="width:6px;display:inline-block"></span>'
    +tileHTML(winTile,"xs win");
  head+='<div class="handrow">'+hrow+"</div>"+'<div class="ylist"><div class="ycol"></div><div class="ycol"></div></div>'+'<div class="rfoot"><div class="rslot rtotal"></div><div class="rslot rscore"></div><div class="rslot rbtn"></div></div>';
  const box=overlayOpen(head,true);
  const list=(box.querySelector&&box.querySelector(".ylist"))||box;
  const foot=(box.querySelector&&box.querySelector(".rfoot"))||box;
  const slot=n=>(box.querySelector&&box.querySelector("."+n))||foot;
  let fast=false;
  box.onclick=()=>{ fast=true; };
  const beat=ms=>sleep(fast?40:ms);
  const add=async(html,ms,toBox)=>{
    const tpl=document.createElement("div");
    tpl.innerHTML=html;
    const el=tpl.firstElementChild||tpl;
    if(toBox){ slot(toBox===true?"rfoot":toBox).appendChild(el); }
    else{
      const c0=list.children[0], c1=list.children[1];
      (c0||list).appendChild(el);
      if(c0&&c1&&list.clientHeight&&list.scrollHeight>list.clientHeight)c1.appendChild(el);
      if(list.scrollHeight>list.clientHeight)list.scrollTop=list.scrollHeight;
    }
    await beat(ms);
  };
  const yline=(a,b)=>'<div class="yline"><span>'+a+"</span><span>"+b+"</span></div>";
  await beat(500);
  if(res.yakumanN){
    const ord=res.yakuman.slice().sort((x,y)=>dispIdx(x[0])-dispIdx(y[0]));
    for(const ym of ord)await add(yline(YAKU_NAME[ym[0]],"役満"),750);
  }else{
    const ord=res.yaku.slice().sort((x,y)=>dispIdx(x[0])-dispIdx(y[0]));
    for(const y of ord)await add(yline(YAKU_NAME[y[0]],y[1]+"翻"),380);
    if(res.doraHan)await add(yline("ドラ",res.doraHan+"翻"),380);
    if(res.akaHan)await add(yline("赤ドラ",res.akaHan+"翻"),380);
    if(p.riichi)await add(yline("裏ドラ",res.uraHan?res.uraHan+"翻":"なし"),380);
  }
  await beat(450);
  const lim=limitName(res.han,res.fu,res.yakumanN);
  const sub=res.yakumanN?lim:(res.fu+"符"+res.han+"翻"+(lim?"　"+lim:""));
  const tier=res.yakumanN>=2?6:res.yakumanN?5:res.han>=13?5:res.han>=11?4:res.han>=8?3:res.han>=6?2:(res.han>=5||basePoints(res.han,res.fu,0)>=2000)?1:0;
  await add('<div class="total'+(tier?" t"+tier:"")+'"><span class="sub">'+sub+"</span>"
    +'<span class="pts">'+pts+'点</span>'
    +"</div>",300,"rtotal");
  await add(yline("お嬢様",G.scores[0]+"点"),80,"rscore");
  await add(yline("CPU",G.scores[1]+"点"),80,"rscore");
  box.onclick=null;
  await overlayButtons(slot("rbtn"),[{label:endNow?"終局へ参りますわ":"次局へ参りますわ",val:1}]);
}
function toast(msg){
  if(typeof document==="undefined")return;
  const el=document.createElement("div");
  el.className="toast"; el.textContent=msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>{ el.style.transition="opacity .4s"; el.style.opacity="0";
    setTimeout(()=>el.remove(),450); },2600);
}
async function showAchievements(){
  const items=ACHV.map(a=>{
    const on=unlocked.has(a[0]);
    return '<div class="ach'+(on?" on":"")+'"><span class="mk">'+(on?"✓":"")+"</span>"
      +'<span class="an">'+a[1]+'</span><span class="ad">'+a[2]+"</span></div>";
  }).join("");
  const h="<h2>実績　"+unlocked.size+" / "+ACHV.length+'</h2><div class="achGrid">'+items+"</div>";
  const v=await showOverlay(h,[{label:"閉じますわ",val:0,cls:"sub"},{label:"リセット",val:9,cls:"sub"}],undefined,true);
  if(v===9){
    const v2=await showOverlay('<h2>実績リセットですの？</h2><div style="font-size:14px">全ての実績を消去いたしますわ｡取り消しはできませんのよ｡</div>',
      [{label:"消去しますわ",val:1},{label:"やめておきますわ",val:0,cls:"sub"}]);
    if(v2===1){ unlocked=new Set(); saveAchv(); toast("実績を消去いたしましたわ"); }
  }
}
function _autoPick(){
  if(!G.sel||!inputState||inputState.tiles!=="sel")return false;
  const b=buildHand(G.players[0].hand34,G.doraInd.map(doraFromIndicator));
  if(!b)return false;
  G.sel.picked=tilesToPos(G.players[0].hand34,rawify(G.players[0].hand34,b.hand));
  const r=inputState; inputState=null; r.resolve({a:"noop"});
  return true;
}
